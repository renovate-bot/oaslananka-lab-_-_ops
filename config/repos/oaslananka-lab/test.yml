version: 1
extends: ../../repo-autonomy.default.yml

repository_role:
  role: ci_cd_mirror
  source_of_truth_owner: oaslananka
  execution_owner: oaslananka-lab

autonomy:
  enabled: true
  profile: full

agent:
  patch: true
  patch_mode_on_check_run_failure: auto
  max_iterations: 5

pr:
  finalize: true
  merge: true
  merge_method: squash
  delete_branch: true
  require_human_review: false
  allow_bot_review: true
  allow_auto_merge: true
  allow_immediate_merge: true
  allow_bypass_ruleset: true

release:
  enabled: false
  trigger_after_merge: false

publish:
  enabled: false

dependabot:
  managed: false
  github_actions: false

mirror:
  enabled: true
  source_owner: oaslananka
  source_repo: test
  source_branch: main
  mirror_owner: oaslananka-lab
  mirror_repo: test
  mirror_branch: main
  direction: source_to_mirror
  promote_back: true
  promote_method: pull_request
  delete_promote_branch: true
  require_source_mirror_sha_match_before_release: true
  require_source_mirror_sha_match_before_publish: true
  allow_mirror_only_closeout: false
