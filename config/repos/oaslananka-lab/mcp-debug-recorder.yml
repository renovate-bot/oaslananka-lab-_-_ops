version: 1
extends: ../../repo-autonomy.default.yml

repository_role:
  role: ci_cd_mirror
  source_of_truth_owner: oaslananka
  execution_owner: oaslananka-lab

autonomy:
  enabled: true
  profile: full

agent:
  patch: true
  patch_mode_on_check_run_failure: auto
  max_iterations: 10
  rollback_on_regression: true

pr:
  finalize: true
  merge: true
  merge_method: squash
  delete_branch: true
  require_clean_checks: true
  require_zero_pending_checks: true
  require_zero_unresolved_threads: true
  require_mergeable: true
  require_human_review: false
  allow_bot_review: true
  allow_auto_merge: true
  allow_immediate_merge: true
  allow_bypass_ruleset: true
  require_expected_head_sha: true

release:
  enabled: true
  trigger_after_merge: true
  release_please: true
  merge_release_pr: true
  create_github_release: true
  require_release_plan_clean: true

publish:
  enabled: true
  npm: true
  mcp_registry: true
  require_environment: production
  trusted_publishing_only: true

mirror:
  enabled: true
  source_owner: oaslananka
  source_repo: mcp-debug-recorder
  source_branch: main
  mirror_owner: oaslananka-lab
  mirror_repo: mcp-debug-recorder
  mirror_branch: main
  direction: source_to_mirror
  promote_back: true
  promote_method: pull_request
  delete_promote_branch: true
  require_source_mirror_sha_match_before_release: true
  require_source_mirror_sha_match_before_publish: true
  allow_mirror_only_closeout: false
