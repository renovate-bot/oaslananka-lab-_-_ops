version: 1
extends: ../../repo-autonomy.default.yml

repository_role:
  role: canonical_source
  source_of_truth_owner: oaslananka
  execution_owner: oaslananka-lab

autonomy:
  enabled: true
  profile: source

agent:
  patch: false
  patch_mode_on_check_run_failure: suggest

pr:
  finalize: true
  merge: true
  require_clean_checks: false
  require_zero_pending_checks: false
  require_zero_unresolved_threads: false

  require_human_review: false
  allow_immediate_merge: true
  require_expected_head_sha: true

release:
  enabled: false
  delegated_to_mirror: true
  trigger_after_merge: false

publish:
  enabled: false
  delegated_to_mirror: true

source:
  accepts_promoted_prs: true
  ci_delegated_to: oaslananka-lab
  actions_expected_enabled: false
  require_clean_mirror_validation: true
