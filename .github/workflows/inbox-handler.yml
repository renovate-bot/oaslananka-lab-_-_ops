name: Inbox Handler

on:
  workflow_dispatch:
    inputs:
      target_owner:
        description: Target owner
        required: true
        type: string
      target_repo:
        description: Target repository
        required: true
        type: string
      issue_number:
        description: Issue number
        required: false
        default: ""
        type: string
      pr_number:
        description: Pull request number
        required: false
        default: ""
        type: string
      event_type:
        description: Event type
        required: true
        default: issue
        type: choice
        options:
          - issue
          - pr
          - comment
  repository_dispatch:
    types:
      - inbox_event

permissions:
  contents: read
  actions: write

concurrency:
  group: inbox-handler-${{ inputs.target_owner || github.event.client_payload.target_owner }}-${{ inputs.target_repo || github.event.client_payload.target_repo }}-${{ inputs.issue_number || inputs.pr_number || github.event.client_payload.issue_number || github.event.client_payload.pr_number }}
  cancel-in-progress: false

jobs:
  handle:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout _ops
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Resolve inputs
        id: resolved
        shell: bash
        run: |
          set -euo pipefail

          TARGET_OWNER="${{ inputs.target_owner || github.event.client_payload.target_owner }}"
          TARGET_REPO="${{ inputs.target_repo || github.event.client_payload.target_repo }}"
          ISSUE_NUMBER="${{ inputs.issue_number || github.event.client_payload.issue_number }}"
          PR_NUMBER="${{ inputs.pr_number || github.event.client_payload.pr_number }}"
          EVENT_TYPE="${{ inputs.event_type || github.event.client_payload.event_type || 'issue' }}"

          if [[ -z "${TARGET_OWNER}" || -z "${TARGET_REPO}" ]]; then
            echo "target_owner and target_repo are required" >&2
            exit 1
          fi

          if [[ -z "${ISSUE_NUMBER}" && -n "${PR_NUMBER}" ]]; then
            ISSUE_NUMBER="${PR_NUMBER}"
          fi

          if [[ -z "${ISSUE_NUMBER}" ]]; then
            echo "issue_number or pr_number is required" >&2
            exit 1
          fi

          {
            echo "target_owner=${TARGET_OWNER}"
            echo "target_repo=${TARGET_REPO}"
            echo "issue_number=${ISSUE_NUMBER}"
            echo "pr_number=${PR_NUMBER}"
            echo "event_type=${EVENT_TYPE}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub App token
        id: app
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3
        with:
          client-id: ${{ vars.REPO_OPS_APP_CLIENT_ID }}
          private-key: ${{ secrets.REPO_OPS_APP_PRIVATE_KEY }}
          owner: ${{ steps.resolved.outputs.target_owner }}
          repositories: ${{ steps.resolved.outputs.target_repo }}

      - name: Handle inbox event
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          OPS_TOKEN: ${{ github.token }}
          TARGET_OWNER: ${{ steps.resolved.outputs.target_owner }}
          TARGET_REPO: ${{ steps.resolved.outputs.target_repo }}
          ISSUE_NUMBER: ${{ steps.resolved.outputs.issue_number }}
          PR_NUMBER: ${{ steps.resolved.outputs.pr_number }}
          EVENT_TYPE: ${{ steps.resolved.outputs.event_type }}
          API_VERSION: "2026-03-10"
          OPS_REPO: oaslananka-lab/_ops
        shell: bash
        run: |
          set -euo pipefail

          REPO="${TARGET_OWNER}/${TARGET_REPO}"
          OUT="out"
          RAW="${OUT}/raw"
          mkdir -p "${RAW}"
          REPORT="${OUT}/inbox-${TARGET_OWNER}-${TARGET_REPO}-${ISSUE_NUMBER}.json"
          STEPS="${OUT}/steps.ndjson"
          : > "${STEPS}"

          api() {
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: ${API_VERSION}" \
              "$@"
          }

          ops_api() {
            GH_TOKEN="${OPS_TOKEN}" gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: ${API_VERSION}" \
              "$@"
          }

          record() {
            jq -n --arg name "$1" --arg status "$2" --arg details "$3" \
              '{name:$name,status:$status,details:$details}' >> "${STEPS}"
          }

          ensure_label() {
            local name="$1"
            local color="$2"
            local description="$3"
            if api --method GET "repos/${REPO}/labels/${name}" >/dev/null 2>&1; then
              return 0
            fi
            api --method POST "repos/${REPO}/labels" \
              -f name="${name}" \
              -f color="${color}" \
              -f description="${description}" >/dev/null
          }

          post_comment() {
            local body_file="$1"
            api --method POST "repos/${REPO}/issues/${ISSUE_NUMBER}/comments" \
              --input "${body_file}" >/dev/null
          }

          update_comment() {
            local comment_id="$1"
            local body_file="$2"
            api --method PATCH "repos/${REPO}/issues/comments/${comment_id}" \
              --input "${body_file}" >/dev/null
          }

          classify_issue() {
            local text="$1"
            local lower
            lower="$(printf '%s' "${text}" | tr '[:upper:]' '[:lower:]')"
            if grep -Eiq 'security|vulnerability|cve|secret|token|credential|exploit' <<< "${lower}"; then
              echo "security"
            elif grep -Eiq 'bug|broken|error|fail|failing|failure|exception|regression|crash' <<< "${lower}"; then
              echo "bug"
            elif grep -Eiq 'feature|enhancement|request|add|support|proposal' <<< "${lower}"; then
              echo "feature"
            else
              echo "question"
            fi
          }

          trigger_ops_workflow() {
            local workflow="$1"
            shift
            local inputs_file="${RAW}/dispatch-${workflow//[^A-Za-z0-9_.-]/-}-inputs.json"
            local body_file="${RAW}/dispatch-${workflow//[^A-Za-z0-9_.-]/-}-body.json"
            local response_file="${RAW}/dispatch-${workflow//[^A-Za-z0-9_.-]/-}-response.json"
            jq -n '{}' > "${inputs_file}"

            while [[ "$#" -gt 0 ]]; do
              case "$1" in
                -f)
                  local pair="$2"
                  local key="${pair%%=*}"
                  local value="${pair#*=}"
                  local next="${inputs_file}.next"
                  jq --arg key "${key}" --arg value "${value}" '. + {($key): $value}' "${inputs_file}" > "${next}"
                  mv "${next}" "${inputs_file}"
                  shift 2
                  ;;
                *)
                  shift
                  ;;
              esac
            done

            jq -n --slurpfile inputs "${inputs_file}" '{ref:"main",inputs:$inputs[0]}' > "${body_file}"
            GH_TOKEN="${OPS_TOKEN}" gh api --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: ${API_VERSION}" \
              "repos/${OPS_REPO}/actions/workflows/${workflow}/dispatches" \
              --input "${body_file}" > "${response_file}"
            jq -r '.workflow_run_id // .id // empty' "${response_file}"
          }

          dispatch_finalize() {
            local pr_num="$1"
            local requested_action="$2"
            api --method GET "repos/${REPO}/pulls/${pr_num}" > "${RAW}/pr-${pr_num}.json"
            local head_sha
            head_sha="$(jq -r '.head.sha // ""' "${RAW}/pr-${pr_num}.json")"
            trigger_ops_workflow ops-pr-finalize.yml \
              -f target_owner="${TARGET_OWNER}" \
              -f target_repo="${TARGET_REPO}" \
              -f pr_number="${pr_num}" \
              -f requested_action="${requested_action}" \
              -f expected_head_sha="${head_sha}" \
              -f dry_run="false" >/dev/null
          }

          dispatch_release_orchestrator() {
            local requested_action="$1"
            trigger_ops_workflow ops-release-orchestrator.yml \
              -f target_owner="${TARGET_OWNER}" \
              -f target_repo="${TARGET_REPO}" \
              -f requested_action="${requested_action}" \
              -f dry_run="false" >/dev/null
          }

          post_body() {
            local body="$1"
            local file="${OUT}/comment-$(date +%s%N).json"
            jq -n --arg body "${body}" '{body:$body}' > "${file}"
            post_comment "${file}"
          }

          if [[ "${EVENT_TYPE}" == "comment" ]]; then
            node scripts/ops-policy.mjs get --owner "${TARGET_OWNER}" --repo "${TARGET_REPO}" > "${OUT}/policy.json"
            api --method GET "repos/${REPO}/issues/${ISSUE_NUMBER}" > "${RAW}/issue.json"
            api --method GET "repos/${REPO}/issues/${ISSUE_NUMBER}/comments" -F per_page=100 > "${RAW}/comments.json"
            jq 'sort_by(.created_at) | last // {}' "${RAW}/comments.json" > "${RAW}/comment.json"
            comment_body="$(jq -r '.body // ""' "${RAW}/comment.json")"

            command="none"
            action_result="ignored"
            pause_label="$(jq -r '.ops.pause_label // "ops-paused"' "${OUT}/policy.json")"
            is_pr="$(jq -r 'has("pull_request")' "${RAW}/issue.json")"
            pr_num="${PR_NUMBER}"
            if [[ -z "${pr_num}" && "${is_pr}" == "true" ]]; then
              pr_num="$(jq -r '.number // ""' "${RAW}/issue.json")"
            fi
            is_paused="$(jq -r --arg pause_label "${pause_label}" '[.labels[]?.name] | index($pause_label) != null' "${RAW}/issue.json")"

            if grep -Eiq '/ops[[:space:]]+release-publish' <<< "${comment_body}"; then
              command="release-publish"
            elif grep -Eiq '/ops[[:space:]]+auto-merge' <<< "${comment_body}"; then
              command="auto-merge"
            elif grep -Eiq '/ops[[:space:]]+finalize' <<< "${comment_body}"; then
              command="finalize"
            elif grep -Eiq '/ops[[:space:]]+merge' <<< "${comment_body}"; then
              command="merge"
            elif grep -Eiq '/ops[[:space:]]+release' <<< "${comment_body}"; then
              command="release"
            elif grep -Eiq '/ops[[:space:]]+publish' <<< "${comment_body}"; then
              command="publish"
            elif grep -Eiq '/ops[[:space:]]+pause' <<< "${comment_body}"; then
              command="pause"
            elif grep -Eiq '/ops[[:space:]]+resume' <<< "${comment_body}"; then
              command="resume"
            elif grep -Eiq '/ops[[:space:]]+policy' <<< "${comment_body}"; then
              command="policy"
            elif grep -Eiq '/ops[[:space:]]+audit' <<< "${comment_body}"; then
              command="audit"
            elif grep -Eiq '/ops[[:space:]]+baseline' <<< "${comment_body}"; then
              command="baseline"
            elif grep -Eiq '/ops[[:space:]]+fix' <<< "${comment_body}"; then
              command="fix"
            elif grep -Eiq '/ops[[:space:]]+help' <<< "${comment_body}"; then
              command="help"
            fi

            if [[ "${is_paused}" == "true" && "${command}" != "resume" && "${command}" != "policy" ]]; then
              post_body "Ops automation is paused for this thread. Allowed commands: \`/ops resume\`, \`/ops policy\`."
              action_result="blocked by ${pause_label}"
            elif [[ "${command}" == "audit" ]]; then
              trigger_ops_workflow repo-audit.yml \
                -f target_owner="${TARGET_OWNER}" \
                -f target_repo="${TARGET_REPO}" >/dev/null
              action_result="triggered repo-audit.yml"
            elif [[ "${command}" == "baseline" ]]; then
              trigger_ops_workflow repo-baseline-plan.yml \
                -f target_owner="${TARGET_OWNER}" \
                -f target_repo="${TARGET_REPO}" >/dev/null
              action_result="triggered repo-baseline-plan.yml"
            elif [[ "${command}" == "fix" ]]; then
              if [[ -n "${pr_num}" ]]; then
                trigger_ops_workflow agent-fix-loop.yml \
                  -f target_owner="${TARGET_OWNER}" \
                  -f target_repo="${TARGET_REPO}" \
                  -f pr_number="${pr_num}" \
                  -f max_iterations="5" \
                  -f patch_mode="$(node scripts/ops-policy.mjs patch-mode --owner "${TARGET_OWNER}" --repo "${TARGET_REPO}")" >/dev/null
                action_result="triggered agent-fix-loop.yml patch mode"
              else
                action_result="no PR number found, skipped"
              fi
            elif [[ "${command}" == "finalize" || "${command}" == "merge" || "${command}" == "auto-merge" ]]; then
              if [[ -n "${pr_num}" ]]; then
                requested="${command//-/_}"
                dispatch_finalize "${pr_num}" "${requested}"
                action_result="triggered ops-pr-finalize.yml ${requested}"
              else
                action_result="no PR number found, skipped"
              fi
            elif [[ "${command}" == "release" ]]; then
              if [[ -n "${pr_num}" ]]; then
                dispatch_finalize "${pr_num}" "release"
                action_result="triggered ops-pr-finalize.yml release path"
              else
                dispatch_release_orchestrator "release"
                action_result="triggered ops-release-orchestrator.yml release"
              fi
            elif [[ "${command}" == "publish" ]]; then
              dispatch_release_orchestrator "publish"
              action_result="triggered ops-release-orchestrator.yml publish"
            elif [[ "${command}" == "release-publish" ]]; then
              dispatch_release_orchestrator "release_and_publish"
              action_result="triggered ops-release-orchestrator.yml release_and_publish"
            elif [[ "${command}" == "pause" ]]; then
              ensure_label "${pause_label}" "ededed" "Ops automation is paused for this issue or PR."
              api --method POST "repos/${REPO}/issues/${ISSUE_NUMBER}/labels" -f labels[]="${pause_label}" >/dev/null
              post_body "Ops automation paused for this thread."
              action_result="added ${pause_label}"
            elif [[ "${command}" == "resume" ]]; then
              api --method DELETE "repos/${REPO}/issues/${ISSUE_NUMBER}/labels/${pause_label}" >/dev/null 2>&1 || true
              post_body "Ops automation resumed for this thread."
              action_result="removed ${pause_label}"
            elif [[ "${command}" == "policy" ]]; then
              profile="$(jq -r '.autonomy.profile' "${OUT}/policy.json")"
              pr_merge="$(jq -r '.pr.merge' "${OUT}/policy.json")"
              release_enabled="$(jq -r '.release.enabled' "${OUT}/policy.json")"
              publish_enabled="$(jq -r '.publish.enabled' "${OUT}/policy.json")"
              post_body "**Effective ops policy**\n\n- Profile: \`${profile}\`\n- PR merge: \`${pr_merge}\`\n- Release enabled: \`${release_enabled}\`\n- Publish enabled: \`${publish_enabled}\`"
              action_result="posted policy summary"
            elif [[ "${command}" == "help" ]]; then
              profile="$(jq -r '.autonomy.profile' "${OUT}/policy.json")"
              post_body "Available ops commands:\n\n- \`/ops audit\`\n- \`/ops baseline\`\n- \`/ops fix\`\n- \`/ops finalize\`\n- \`/ops merge\`\n- \`/ops auto-merge\`\n- \`/ops release\`\n- \`/ops publish\`\n- \`/ops release-publish\`\n- \`/ops pause\`\n- \`/ops resume\`\n- \`/ops policy\`\n- \`/ops help\`\n\nCurrent autonomy profile: \`${profile}\`"
              action_result="posted help"
            fi

            record "comment_command" "${command}" "${action_result}"

            jq -s '.' "${STEPS}" > "${OUT}/steps.json"
            jq -n \
              --arg generated_at "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
              --arg target "${REPO}" \
              --arg issue_number "${ISSUE_NUMBER}" \
              --arg event_type "${EVENT_TYPE}" \
              --arg command "${command}" \
              --arg action_result "${action_result}" \
              --slurpfile steps "${OUT}/steps.json" \
              '{generated_at:$generated_at,target:$target,issue_number:($issue_number|tonumber),event_type:$event_type,command:$command,action_result:$action_result,steps:$steps[0]}' \
              > "${REPORT}"
          else
            api --method GET "repos/${REPO}/issues/${ISSUE_NUMBER}" > "${RAW}/issue.json"
            title="$(jq -r '.title // ""' "${RAW}/issue.json")"
            body="$(jq -r '.body // ""' "${RAW}/issue.json")"
            combined="${title}"$'\n'"${body}"

            jq -n '{
              body: "👋 This issue has been received by the ops automation system.\nAnalyzing..."
            }' > "${OUT}/ack-comment.json"
            post_comment "${OUT}/ack-comment.json" > "${RAW}/ack-comment-response.json"
            ack_id="$(jq -r '.id' "${RAW}/ack-comment-response.json")"
            record "acknowledgement" "posted" "comment_id=${ack_id}"

            classification="$(classify_issue "${combined}")"
            labels=()
            notes=()

            if [[ "${classification}" == "bug" ]] && grep -Eiq 'ci|cd|workflow|actions|repo ops|repo-ops|baseline|mirror|release|ruleset' <<< "${combined}"; then
              ensure_label "ops-triage" "5319e7" "Issue is related to repository operations or CI/CD automation."
              api --method POST "repos/${REPO}/issues/${ISSUE_NUMBER}/labels" -f labels[]="ops-triage" >/dev/null
              labels+=("ops-triage")
              notes+=("CI/CD or repo-ops signal detected.")
            fi

            if [[ "${classification}" == "security" ]]; then
              ensure_label "security" "d73a4a" "Security-sensitive issue."
              api --method POST "repos/${REPO}/issues/${ISSUE_NUMBER}/labels" -f labels[]="security" >/dev/null
              labels+=("security")
              notes+=("Security policy: https://github.com/${TARGET_OWNER}/${TARGET_REPO}/security/policy")
            fi

            if [[ "${#labels[@]}" -eq 0 ]]; then
              labels_json="[]"
            else
              labels_json="$(printf '%s\n' "${labels[@]}" | jq -R . | jq -s .)"
            fi
            notes_text="$(printf '%s\n' "${notes[@]}" | sed '/^$/d' | sed 's/^/- /' || true)"
            if [[ -z "${notes_text}" ]]; then
              notes_text="- No automatic labels were required."
            fi

            jq -n \
              --arg classification "${classification}" \
              --arg notes "${notes_text}" \
              '{
                body: ("👋 This issue has been received by the ops automation system.\n\nClassification: `" + $classification + "`\n\n" + $notes)
              }' > "${OUT}/classification-comment.json"
            update_comment "${ack_id}" "${OUT}/classification-comment.json"
            record "classification" "${classification}" "updated acknowledgement comment"

            jq -s '.' "${STEPS}" > "${OUT}/steps.json"
            jq -n \
              --arg generated_at "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
              --arg target "${REPO}" \
              --arg issue_number "${ISSUE_NUMBER}" \
              --arg event_type "${EVENT_TYPE}" \
              --arg classification "${classification}" \
              --argjson labels "${labels_json}" \
              --slurpfile steps "${OUT}/steps.json" \
              '{generated_at:$generated_at,target:$target,issue_number:($issue_number|tonumber),event_type:$event_type,classification:$classification,labels_applied:$labels,steps:$steps[0]}' \
              > "${REPORT}"
          fi

          {
            echo "### Inbox Handler"
            echo ""
            echo "| Field | Value |"
            echo "|---|---:|"
            echo "| Target | ${REPO} |"
            echo "| Issue/PR | #${ISSUE_NUMBER} |"
            echo "| Event type | ${EVENT_TYPE} |"
            echo "| Report | $(basename "${REPORT}") |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload inbox report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: inbox-${{ steps.resolved.outputs.target_owner }}-${{ steps.resolved.outputs.target_repo }}-${{ steps.resolved.outputs.issue_number }}
          path: out/
          retention-days: 14
