name: Agent Fix Loop v2

on:
  workflow_dispatch:
    inputs:
      target_owner:
        description: Target owner or organization
        required: true
        type: string
      target_repo:
        description: Target repository
        required: true
        type: string
      pr_number:
        description: Pull request number
        required: true
        type: string
      max_iterations:
        description: Maximum loop iterations
        required: true
        default: "5"
        type: string
      patch_mode:
        description: "patch | suggest"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - suggest

permissions:
  contents: read
  actions: write

concurrency:
  group: agent-fix-loop-${{ inputs.target_owner }}-${{ inputs.target_repo }}-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  fix-loop:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      GIT_TERMINAL_PROMPT: "0"
      GCM_INTERACTIVE: Never

    steps:
      - name: Checkout _ops
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Create GitHub App token
        id: app
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3
        with:
          client-id: ${{ vars.REPO_OPS_APP_CLIENT_ID }}
          private-key: ${{ secrets.REPO_OPS_APP_PRIVATE_KEY }}
          owner: ${{ inputs.target_owner }}
          repositories: ${{ inputs.target_repo }}

      - name: Run autonomous patch loop
        env:
          TARGET_TOKEN: ${{ steps.app.outputs.token }}
          OPS_TOKEN: ${{ github.token }}
          TARGET_OWNER: ${{ inputs.target_owner }}
          TARGET_REPO: ${{ inputs.target_repo }}
          PR_NUMBER: ${{ inputs.pr_number }}
          MAX_ITERATIONS: ${{ inputs.max_iterations }}
          PATCH_MODE: ${{ inputs.patch_mode }}
          API_VERSION: "2026-03-10"
          OPS_REPO: oaslananka-lab/_ops
        shell: bash
        run: |
          set -euo pipefail

          REPO="${TARGET_OWNER}/${TARGET_REPO}"
          OUT="${GITHUB_WORKSPACE}/out"
          WORK="${RUNNER_TEMP}/agent-fix-loop"
          ITERATION_LOG="${OUT}/agent-fix-loop-${TARGET_OWNER}-${TARGET_REPO}-${PR_NUMBER}.ndjson"
          REPORT="${OUT}/agent-fix-loop-${TARGET_OWNER}-${TARGET_REPO}-${PR_NUMBER}.json"

          mkdir -p "${OUT}/iterations" "${WORK}"
          : > "${ITERATION_LOG}"

          gh_retry() {
            local token="$1"
            shift
            local attempt=1
            local max_attempts=6
            local delay=30
            local err="${OUT}/gh-retry-$RANDOM.err"

            while true; do
              if GH_TOKEN="${token}" gh "$@" 2> "${err}"; then
                rm -f "${err}"
                return 0
              fi
              local status="$?"
              if grep -qi "API rate limit exceeded" "${err}" && [[ "${attempt}" -lt "${max_attempts}" ]]; then
                echo "GitHub API rate limit hit; retrying in ${delay}s (attempt ${attempt}/${max_attempts})." >&2
                sleep "${delay}"
                attempt=$((attempt + 1))
                delay=$((delay * 2))
                continue
              fi
              cat "${err}" >&2
              rm -f "${err}"
              return "${status}"
            done
          }

          target_api() {
            gh_retry "${TARGET_TOKEN}" api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: ${API_VERSION}" \
              "$@"
          }

          ops_gh() {
            gh_retry "${OPS_TOKEN}" "$@"
          }

          ops_api() {
            gh_retry "${OPS_TOKEN}" api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: ${API_VERSION}" \
              "$@"
          }

          post_comment_text() {
            local text="$1"
            local body_file="${OUT}/comment-$(date +%s%N).json"
            text="${text//\\n/$'\n'}"
            text="${text//\\t/$'\t'}"
            jq -n --arg body "${text}" '{body:$body}' > "${body_file}"
            target_api --method POST "repos/${REPO}/issues/${PR_NUMBER}/comments" --input "${body_file}" >/dev/null
          }

          normalize_max_iterations() {
            local value="$1"
            if [[ "${value}" =~ ^[0-9]+$ ]] && [[ "${value}" -ge 1 ]] && [[ "${value}" -le 10 ]]; then
              echo "${value}"
            else
              echo "5"
            fi
          }

          append_iteration_log() {
            local iteration="$1"
            local diagnostics_run_id="$2"
            local classification="$3"
            local action="$4"
            local commit_sha="$5"
            local failing="$6"
            local pending="$7"
            local failed_runs="$8"
            local unresolved="$9"

            jq -n \
              --arg iteration "${iteration}" \
              --arg diagnostics_run_id "${diagnostics_run_id}" \
              --arg diagnostics_run_url "https://github.com/${OPS_REPO}/actions/runs/${diagnostics_run_id}" \
              --arg classification "${classification}" \
              --arg action "${action}" \
              --arg commit_sha "${commit_sha}" \
              --argjson failing "${failing}" \
              --argjson pending "${pending}" \
              --argjson failed_runs "${failed_runs}" \
              --argjson unresolved_review_threads "${unresolved}" \
              '{
                iteration: ($iteration|tonumber),
                diagnostics_run_id: ($diagnostics_run_id|tonumber),
                diagnostics_run_url: $diagnostics_run_url,
                classification: $classification,
                action: $action,
                commit_sha: (if $commit_sha == "" then null else $commit_sha end),
                check_summary: {
                  failing: $failing,
                  pending: $pending
                },
                failed_runs: $failed_runs,
                unresolved_review_threads: $unresolved_review_threads
              }' >> "${ITERATION_LOG}"
          }

          combine_failed_logs() {
            local artifact_dir="$1"
            local combined="$2"
            find "${artifact_dir}" -type f -path '*failed-run-logs/*.log' -print0 2>/dev/null |
              xargs -0 cat > "${combined}" 2>/dev/null || true
          }

          has_review_suggestion() {
            local threads_file="$1"
            jq -e '
              any(.[]?.comments.nodes[]?; (.body // "") | test("```suggestion"; "i"))
            ' "${threads_file}" >/dev/null 2>&1
          }

          classify_failure() {
            local artifact_dir="$1"
            local diagnostics_file="$2"
            local combined="${OUT}/combined-failed-logs.txt"
            local threads_file
            threads_file="$(find "${artifact_dir}" -name unresolved-review-threads.json -print -quit)"
            combine_failed_logs "${artifact_dir}" "${combined}"

            if [[ -n "${threads_file}" ]] && has_review_suggestion "${threads_file}"; then
              echo "review-thread patch"
            elif [[ -s "${combined}" ]] && grep -Eiq 'trailing[[:space:]-]+whitespace|trailing spaces|whitespace check failed|CRLF|line endings' "${combined}"; then
              echo "trailing whitespace"
            elif [[ -s "${combined}" ]] && grep -Eiq 'prettier|format:check|formatting|eslint|lint' "${combined}"; then
              echo "format/lint"
            elif [[ -s "${combined}" ]] && grep -Eiq 'codecov|Token required because branch is protected|Upload queued for processing failed' "${combined}"; then
              echo "codecov token required"
            elif [[ -s "${combined}" ]] && grep -Eiq 'Invalid workflow file|YAMLException|workflow syntax|mapping values are not allowed|did not find expected|bad indentation' "${combined}"; then
              echo "workflow syntax"
            elif [[ -s "${combined}" ]] && grep -Eiq 'actionlint|Unexpected input\(s\)|Unexpected input' "${combined}"; then
              echo "actionlint failure"
            elif [[ -s "${combined}" ]] && grep -Eiq 'Resource not accessible by integration|permission denied|permissions?:.*(write|read)|requires.*permission' "${combined}"; then
              echo "simple permission"
            elif [[ -s "${combined}" ]] && grep -Eiq 'publish_workflow_not_found|publish workflow (missing|not found)|no supported publish workflow' "${combined}"; then
              echo "publish workflow discovery missing"
            elif [[ -s "${combined}" ]] && grep -Eiq 'expected check missing|required status checks.*expected|expected.*not reported|required check.*not reported' "${combined}"; then
              echo "required check expected but not reported"
            elif [[ -s "${combined}" ]] && grep -Eiq 'ruleset.*required check.*mismatch|required status check.*not emitted|config-only PR.*ruleset' "${combined}"; then
              echo "ruleset required check mismatch"
            elif [[ -s "${combined}" ]] && grep -Eiq 'config-only.*blocked|dependabot.yml.*required checks|paths-ignore.*required check' "${combined}"; then
              echo "config-only pr blocked by ruleset"
            elif [[ -s "${combined}" ]] && grep -Eiq 'production environment (is )?(missing|not found)|environment_required_missing|environment.*production.*missing' "${combined}"; then
              echo "environment required missing"
            elif [[ -s "${combined}" ]] && grep -Eiq 'already published|already exists|cannot publish over previously published version|NPM_PACKAGE_VERSION_ALREADY_PUBLISHED|MARKETPLACE_VERSION_ALREADY_PUBLISHED|OPEN_VSX_VERSION_ALREADY_PUBLISHED' "${combined}"; then
              echo "publish already published idempotent noop"
            elif [[ -s "${combined}" ]] && grep -Eiq 'NPM_PUBLISH_E404|npm ERR! code E404|npm ERR! 404' "${combined}" && grep -Eiq 'NODE_AUTH_TOKEN[^A-Za-z0-9_]*(empty|missing|not set)|empty NODE_AUTH_TOKEN' "${combined}"; then
              echo "npm publish auth missing"
            elif [[ -s "${combined}" ]] && grep -Eiq 'NPM_TOKEN_SECRET_MISSING|NODE_AUTH_TOKEN.*(missing|not set)|npm ERR! code ENEEDAUTH|npm ERR! need auth|npm ERR! code E401' "${combined}"; then
              echo "npm token secret missing"
            elif [[ -s "${combined}" ]] && grep -Eiq 'NPM_TRUSTED_PUBLISHING_NOT_CONFIGURED|trusted publishing.*not configured|provenance.*trusted publishing' "${combined}"; then
              echo "npm trusted publishing missing"
            elif [[ -s "${combined}" ]] && grep -Eiq 'NPM_PACKAGE_NAME_UNAVAILABLE|package name.*(unavailable|reserved|already exists)' "${combined}"; then
              echo "npm package name unavailable"
            elif [[ -s "${combined}" ]] && grep -Eiq 'NPM_REGISTRY_PERMISSION_DENIED|npm ERR! code E403|forbidden|permission.*npm' "${combined}"; then
              echo "npm registry permission denied"
            elif [[ -s "${combined}" ]] && grep -Eiq 'MARKETPLACE_SECRET_MISSING|VSCE_PAT|VS_MARKETPLACE_TOKEN|vsce.*token.*missing|marketplace.*token.*missing' "${combined}"; then
              echo "vscode marketplace secret missing"
            elif [[ -s "${combined}" ]] && grep -Eiq 'OPEN_VSX_SECRET_MISSING|OVSX_PAT|OPEN_VSX_TOKEN|open vsx.*token.*missing|ovsx.*token.*missing' "${combined}"; then
              echo "open vsx secret missing"
            elif [[ -s "${combined}" ]] && grep -Eiq 'MCP_REGISTRY_CONFIG_MISSING|MCP registry config.*missing|mcp.*registry.*metadata.*missing' "${combined}"; then
              echo "mcp registry config missing"
            elif [[ -s "${combined}" ]] && grep -Eiq 'MCP_REGISTRY_CREDENTIALS_MISSING|MCP_REGISTRY_TOKEN|mcp.*registry.*token.*missing|mcp.*registry.*credentials.*missing' "${combined}"; then
              echo "mcp registry secret missing"
            elif [[ -s "${combined}" ]] && grep -Eiq 'HTTP 405.*code owner review|Waiting on code owner review|code owner review.*required' "${combined}"; then
              echo "ruleset codeowner review required"
            elif [[ -s "${combined}" ]] && grep -Eiq 'RULESET_BYPASS_NOT_CONFIGURABLE_BY_API|ruleset.*bypass.*not configurable|bypass actor.*not configurable' "${combined}"; then
              echo "ruleset bypass not configurable by api"
            elif [[ -s "${combined}" ]] && grep -Eiq 'CODEOWNER_APPROVAL_NOT_AUTOMATABLE_BY_APP|codeowner approval.*not automatable|self.approval.*not allowed' "${combined}"; then
              echo "codeowner approval not automatable by app"
            elif [[ -s "${combined}" ]] && grep -Eiq 'API rate limit exceeded|secondary rate limit|rate limit.*reset' "${combined}"; then
              echo "github api rate limit"
            elif [[ -s "${combined}" ]] && grep -Eiq 'protected branch hook declined|repository rule violations|changes must be made through a pull request|direct PAT write|signed commits required|verified signature' "${combined}"; then
              echo "direct write blocked by ruleset"
            elif [[ -s "${combined}" ]] && grep -Eiq 'merge conflict|CONFLICT|Pull Request has merge conflicts|sync branch.*conflict' "${combined}"; then
              echo "mirror sync conflict"
            elif [[ -s "${combined}" ]] && grep -Eiq 'pin.*action|unpinned|deprecated action|Node.js 20 actions are deprecated|uses:.*@[vV]?[0-9]' "${combined}"; then
              echo "action pin update"
            elif [[ -s "${combined}" ]] && grep -Eiq 'lockfile|frozen-lockfile|ERR_PNPM_OUTDATED_LOCKFILE|package-lock.json|pnpm-lock.yaml' "${combined}"; then
              echo "missing lockfile"
            elif jq -e '.run_summary.failures > 0 or .check_summary.failing > 0' "${diagnostics_file}" >/dev/null; then
              echo "unknown"
            else
              echo "pending"
            fi
          }

          suggestion_for_class() {
            local classification="$1"
            case "${classification}" in
              "format/lint")
                printf '%s\n' "Run the repository formatter/linter, commit only deterministic formatting or lint autofix output, then push the same PR branch."
                ;;
              "workflow syntax")
                printf '%s\n' "Inspect the failed workflow line, fix only the syntax error, then validate with actionlint before pushing."
                ;;
              "actionlint failure")
                printf '%s\n' "Run actionlint against the changed workflow and fix invalid inputs or syntax without broadening workflow permissions."
                ;;
              "simple permission")
                printf '%s\n' "Add the smallest required permissions block to the affected workflow or job. Do not broaden repository permissions beyond the failed operation."
                ;;
              "action pin update")
                printf '%s\n' "Replace the deprecated or unpinned action reference with the current allowed pinned reference used by repository policy."
                ;;
              "codecov token required")
                printf '%s\n' "Make Codecov upload non-blocking unless a protected CODECOV_TOKEN is configured; coverage upload failure must not block source/mirror sync."
                ;;
              "publish workflow discovery missing")
                printf '%s\n' "Add a supported production publish workflow or update release orchestrator discovery so publish policy maps to an existing workflow."
                ;;
              "required check expected but not reported"|"ruleset required check mismatch"|"config-only pr blocked by ruleset")
                printf '%s\n' "Ensure every ruleset-required check name is emitted on every pull_request path, including config-only PRs; do not hide required workflows with paths-ignore."
                ;;
              "environment required missing")
                printf '%s\n' "Run the production environment audit/ensure workflow for the target repository and keep publish jobs gated by environment: production."
                ;;
              "publish already published idempotent noop")
                printf '%s\n' "Treat duplicate package or extension versions as already_published/idempotent_noop and update publish-report evidence instead of retrying a fresh publish."
                ;;
              "npm publish auth missing"|"npm token secret missing"|"npm trusted publishing missing"|"npm package name unavailable"|"npm registry permission denied")
                printf '%s\n' "Keep npm publishing on the protected production environment and report the exact registry/trusted-publishing/secret blocker without printing secret values."
                ;;
              "vscode marketplace secret missing"|"open vsx secret missing")
                printf '%s\n' "Keep extension publishing on the protected production environment and report the exact marketplace secret name required."
                ;;
              "mcp registry config missing"|"mcp registry secret missing")
                printf '%s\n' "Do not invent MCP registry metadata; report the missing config or credential name exactly."
                ;;
              "ruleset codeowner review required"|"ruleset bypass not configurable by api"|"codeowner approval not automatable by app")
                printf '%s\n' "Attempt policy-permitted approval, ruleset bypass, or CODEOWNERS remediation; if GitHub blocks it, record the exact HTTP response and run URL."
                ;;
              "github api rate limit")
                printf '%s\n' "Back off and retry after the GitHub rate-limit reset; do not interpret rate-limited responses as missing files."
                ;;
              "direct write blocked by ruleset")
                printf '%s\n' "Stop direct content writes and use the GitHub App branch/PR or _ops baseline workflow path with expected head SHA."
                ;;
              "mirror sync conflict")
                printf '%s\n' "Regenerate the sync PR from current source and mirror heads, then merge only after required checks report success."
                ;;
              "review-thread patch")
                printf '%s\n' "Apply only the one-line suggested change from the unresolved review thread, then rerun diagnostics."
                ;;
              "missing lockfile")
                printf '%s\n' "Regenerate the lockfile with the repository package manager and commit the manifest plus lockfile together."
                ;;
              "trailing whitespace")
                printf '%s\n' "Strip trailing whitespace and normalize line endings, then push the same PR branch."
                ;;
              "pending")
                printf '%s\n' "Checks are still pending. Wait for current-head checks to complete before patching."
                ;;
              *)
                printf '%s\n' "The failure is non-patchable by the v2 MVP. Inspect diagnostics and failed-run logs manually before changing code."
                ;;
            esac
          }

          clone_pr_branch() {
            local head_ref="$1"
            local dest="$2"
            rm -rf "${dest}"
            git clone --depth=1 --branch="${head_ref}" "https://x-access-token:${TARGET_TOKEN}@github.com/${REPO}.git" "${dest}" >/dev/null 2>&1
            git -C "${dest}" config user.name "oaslananka-repo-ops[bot]"
            git -C "${dest}" config user.email "oaslananka-repo-ops[bot]@users.noreply.github.com"
            git -C "${dest}" config commit.gpgsign false
            git -C "${dest}" config tag.gpgSign false
          }

          strip_trailing_whitespace() {
            local repo_dir="$1"
            python - "${repo_dir}" <<'PY'
          from pathlib import Path
          import sys

          root = Path(sys.argv[1])
          skip_dirs = {".git", "node_modules", ".pnpm-store", "dist", "coverage", ".next"}
          text_suffixes = {
              ".c", ".cc", ".cpp", ".css", ".go", ".h", ".html", ".js", ".json", ".jsx",
              ".mjs", ".md", ".py", ".sh", ".ts", ".tsx", ".txt", ".yml", ".yaml"
          }

          for path in root.rglob("*"):
              if not path.is_file():
                  continue
              if any(part in skip_dirs for part in path.parts):
                  continue
              if path.suffix.lower() not in text_suffixes and path.name not in {"Taskfile.yml", "CODEOWNERS"}:
                  continue
              data = path.read_bytes()
              if b"\x00" in data:
                  continue
              try:
                  text = data.decode("utf-8")
              except UnicodeDecodeError:
                  continue
              normalized = "\n".join(line.rstrip(" \t") for line in text.replace("\r\n", "\n").replace("\r", "\n").split("\n"))
              if text.endswith(("\n", "\r\n", "\r")) and not normalized.endswith("\n"):
                  normalized += "\n"
              if normalized != text:
                  path.write_text(normalized, encoding="utf-8", newline="\n")
          PY
          }

          run_node_format_lint() {
            local repo_dir="$1"
            if [[ ! -f "${repo_dir}/package.json" ]]; then
              return 0
            fi
            (
              cd "${repo_dir}"
              corepack enable || true
              if [[ -f pnpm-lock.yaml ]]; then
                corepack pnpm install --frozen-lockfile || true
              fi
              if jq -e '.scripts.format' package.json >/dev/null; then
                corepack pnpm run format || true
              fi
              corepack pnpm exec prettier --write --ignore-unknown . || true
              if jq -e '.scripts.lint' package.json >/dev/null; then
                corepack pnpm run lint || true
              fi
            )
          }

          patch_codecov_nonblocking() {
            local repo_dir="$1"
            python - "${repo_dir}" <<'PY'
          from pathlib import Path
          import re
          import sys

          root = Path(sys.argv[1])
          workflows = root / ".github" / "workflows"
          if not workflows.exists():
              raise SystemExit(0)

          for path in list(workflows.glob("*.yml")) + list(workflows.glob("*.yaml")):
              lines = path.read_text(encoding="utf-8").splitlines(keepends=True)
              changed = False
              index = 0
              while index < len(lines):
                  line = lines[index]
                  if re.search(r"uses:\s*codecov/codecov-action@", line):
                      indent = re.match(r"^(\s*)", line).group(1)
                      step_start = index
                      while step_start > 0:
                          previous = lines[step_start - 1]
                          previous_indent = re.match(r"^(\s*)", previous).group(1)
                          if previous.lstrip().startswith("- ") and len(previous_indent) <= len(indent):
                              break
                          step_start -= 1
                      step = "".join(lines[step_start:index + 1])
                      if "continue-on-error:" not in step:
                          lines.insert(index, f"{indent}continue-on-error: true\n")
                          changed = True
                          index += 1
                  index += 1
              if changed:
                  path.write_text("".join(lines), encoding="utf-8", newline="\n")
          PY
          }

          resolve_unresolved_review_threads() {
            local iteration_dir="$1"
            local threads_file
            threads_file="$(find "${iteration_dir}" -name unresolved-review-threads.json -print -quit)"
            if [[ -z "${threads_file}" || ! -s "${threads_file}" ]]; then
              return 0
            fi
            jq -r '.[]?.id // .[]?.threadId // empty' "${threads_file}" | while read -r thread_id; do
              if [[ -z "${thread_id}" ]]; then
                continue
              fi
              GH_TOKEN="${TARGET_TOKEN}" gh api graphql \
                -f query='mutation($threadId: ID!) { resolveReviewThread(input: { threadId: $threadId }) { thread { id isResolved } } }' \
                -f threadId="${thread_id}" > "${OUT}/resolved-review-thread-${thread_id}.json" || true
            done
          }

          generate_lockfile_if_missing() {
            local repo_dir="$1"
            if [[ -f "${repo_dir}/package.json" && ! -f "${repo_dir}/pnpm-lock.yaml" ]]; then
              (
                cd "${repo_dir}"
                corepack enable || true
                corepack pnpm install --lockfile-only || true
              )
            fi
          }

          scaffold_publish_workflow() {
            local repo_dir="$1"
            local publish_dir="${repo_dir}/.github/workflows"
            mkdir -p "${publish_dir}"
            render_template() {
              local source_template="$1"
              local destination="$2"
              sed "s#__TARGET_REPOSITORY__#${TARGET_OWNER}/${TARGET_REPO}#g" "${source_template}" > "${destination}"
            }
            if [[ "$(jq -r '.publish.npm // false' "${OUT}/policy.json")" == "true" && "$(jq -r '.publish.mcp_registry // false' "${OUT}/policy.json")" == "true" && ! -f "${publish_dir}/publish-production.yml" ]]; then
              render_template "${GITHUB_WORKSPACE}/templates/publish-production-mcp.yml" "${publish_dir}/publish-production.yml"
            elif [[ "$(jq -r '.publish.npm // false' "${OUT}/policy.json")" == "true" && ! -f "${publish_dir}/publish-production.yml" ]]; then
              render_template "${GITHUB_WORKSPACE}/templates/publish-production-npm.yml" "${publish_dir}/publish-production.yml"
            fi
            if { [[ "$(jq -r '.publish.vscode_marketplace // false' "${OUT}/policy.json")" == "true" ]] || [[ "$(jq -r '.publish.open_vsx // false' "${OUT}/policy.json")" == "true" ]]; } && [[ ! -f "${publish_dir}/publish-production.yml" ]]; then
              render_template "${GITHUB_WORKSPACE}/templates/publish-production-vsce.yml" "${publish_dir}/publish-production.yml"
            fi
            if [[ "$(jq -r '.publish.mcp_registry // false' "${OUT}/policy.json")" == "true" && ! -f "${publish_dir}/mcp-registry.yml" ]]; then
              render_template "${GITHUB_WORKSPACE}/templates/mcp-registry.yml" "${publish_dir}/mcp-registry.yml"
            fi
            if [[ "$(jq -r '.publish.github_pages // false' "${OUT}/policy.json")" == "true" && ! -f "${publish_dir}/deploy-pages.yml" ]]; then
              render_template "${GITHUB_WORKSPACE}/templates/deploy-pages.yml" "${publish_dir}/deploy-pages.yml"
            fi
          }

          call_ensure_production_environment() {
            GH_TOKEN="${TARGET_TOKEN}" node "${GITHUB_WORKSPACE}/scripts/ensure-production-environment.mjs" \
              --owner "${TARGET_OWNER}" \
              --repo "${TARGET_REPO}" \
              --environment production \
              --mode reset_reviewers \
              --apply > "${OUT}/ensure-production-environment-${TARGET_OWNER}-${TARGET_REPO}.json"
          }

          update_action_pins() {
            local repo_dir="$1"
            node "${GITHUB_WORKSPACE}/scripts/update-action-pins.mjs" --root "${repo_dir}"
          }

          apply_patch_for_class() {
            local classification="$1"
            local repo_dir="$2"
            case "${classification}" in
              "format/lint")
                strip_trailing_whitespace "${repo_dir}"
                run_node_format_lint "${repo_dir}"
                ;;
              "trailing whitespace")
                strip_trailing_whitespace "${repo_dir}"
                ;;
              "missing lockfile")
                generate_lockfile_if_missing "${repo_dir}"
                ;;
              "publish workflow discovery missing")
                scaffold_publish_workflow "${repo_dir}"
                ;;
              "environment required missing")
                call_ensure_production_environment
                ;;
              "action pin update")
                update_action_pins "${repo_dir}"
                ;;
              "codecov token required")
                patch_codecov_nonblocking "${repo_dir}"
                ;;
              "workflow syntax"|"simple permission"|"review-thread patch"|"actionlint failure"|"npm publish auth missing"|"npm token secret missing"|"npm trusted publishing missing"|"npm package name unavailable"|"npm registry permission denied"|"vscode marketplace secret missing"|"open vsx secret missing"|"mcp registry config missing"|"mcp registry secret missing"|"ruleset codeowner review required"|"ruleset bypass not configurable by api"|"codeowner approval not automatable by app"|"required check expected but not reported"|"ruleset required check mismatch"|"config-only pr blocked by ruleset"|"publish already published idempotent noop"|"github api rate limit"|"direct write blocked by ruleset"|"mirror sync conflict")
                return 2
                ;;
              *)
                return 2
                ;;
            esac
          }

          commit_and_push_if_changed() {
            local repo_dir="$1"
            local classification="$2"
            local head_ref="$3"
            if [[ -z "$(git -C "${repo_dir}" status --porcelain)" ]]; then
              return 3
            fi
            git -C "${repo_dir}" add -A
            git -C "${repo_dir}" -c commit.gpgsign=false commit --no-gpg-sign -m "fix: auto-patch ${classification} in ${head_ref}" >&2
            local commit_sha
            commit_sha="$(git -C "${repo_dir}" rev-parse HEAD)"
            git -C "${repo_dir}" push origin "HEAD:${head_ref}" >&2
            echo "${commit_sha}"
          }

          rollback_commit() {
            local head_ref="$1"
            local commit_sha="$2"
            local dest="${WORK}/rollback"
            clone_pr_branch "${head_ref}" "${dest}"
            git -C "${dest}" revert --no-edit "${commit_sha}"
            git -C "${dest}" push origin "HEAD:${head_ref}"
          }

          diagnostics_clean() {
            local failing="$1"
            local pending="$2"
            local failed_runs="$3"
            local unresolved="$4"
            [[ "${failing}" -eq 0 && "${pending}" -eq 0 && "${failed_runs}" -eq 0 && "${unresolved}" -eq 0 ]]
          }

          is_worse_than_previous() {
            local failing="$1"
            local failed_runs="$2"
            local unresolved="$3"
            local prev_failing="$4"
            local prev_failed_runs="$5"
            local prev_unresolved="$6"
            [[ "${failing}" -gt "${prev_failing}" || "${failed_runs}" -gt "${prev_failed_runs}" || "${unresolved}" -gt "${prev_unresolved}" ]]
          }

          max_iterations="$(normalize_max_iterations "${MAX_ITERATIONS}")"
          patch_mode="${PATCH_MODE}"
          node scripts/ops-policy.mjs get --owner "${TARGET_OWNER}" --repo "${TARGET_REPO}" > "${OUT}/policy.json"
          policy_patch_mode="$(node scripts/ops-policy.mjs patch-mode --owner "${TARGET_OWNER}" --repo "${TARGET_REPO}")"
          if [[ "${patch_mode}" == "auto" ]]; then
            patch_mode="${policy_patch_mode}"
          elif [[ "${patch_mode}" != "patch" && "${patch_mode}" != "suggest" ]]; then
            patch_mode="${policy_patch_mode}"
          fi
          if [[ "${patch_mode}" == "patch" && "${policy_patch_mode}" != "patch" ]]; then
            patch_mode="suggest"
          fi

          target_api --method GET "repos/${REPO}/pulls/${PR_NUMBER}" > "${OUT}/pr-api.json"
          head_ref="$(jq -r '.head.ref // ""' "${OUT}/pr-api.json")"
          base_ref="$(jq -r '.base.ref // ""' "${OUT}/pr-api.json")"
          head_repo="$(jq -r '.head.repo.full_name // ""' "${OUT}/pr-api.json")"

          if [[ -z "${head_ref}" || "${head_ref}" == "main" || "${head_ref}" == "master" || "${head_ref}" == "${base_ref}" || "${head_repo}" != "${REPO}" ]]; then
            post_comment_text "Agent fix loop stopped: unsafe branch target. head_ref=${head_ref}, base_ref=${base_ref}, head_repo=${head_repo}."
            exit 0
          fi

          final_state="max_iterations_reached"
          last_auto_commit=""
          prev_failing=0
          prev_failed_runs=0
          prev_unresolved=0

          for iteration in $(seq 1 "${max_iterations}"); do
            dispatch_body="${OUT}/diagnostics-dispatch-${iteration}.json"
            dispatch_response="${OUT}/diagnostics-dispatch-${iteration}-response.json"
            jq -n \
              --arg target_owner "${TARGET_OWNER}" \
              --arg target_repo "${TARGET_REPO}" \
              --arg pr_number "${PR_NUMBER}" \
              '{
                ref: "main",
                inputs: {
                  target_owner: $target_owner,
                  target_repo: $target_repo,
                  pr_number: $pr_number
                }
              }' > "${dispatch_body}"

            ops_api --method POST \
              "repos/${OPS_REPO}/actions/workflows/agent-pr-diagnostics.yml/dispatches" \
              --input "${dispatch_body}" > "${dispatch_response}"

            run_id=""
            if [[ -s "${dispatch_response}" ]]; then
              run_id="$(jq -r '.workflow_run_id // .id // empty' "${dispatch_response}" 2>/dev/null || true)"
            fi

            if [[ -z "${run_id}" ]]; then
              sleep 8
              run_id="$(ops_gh run list --repo "${OPS_REPO}" --workflow agent-pr-diagnostics.yml --limit 10 --json databaseId |
                jq -r '.[0].databaseId // empty')"
            fi

            if [[ -z "${run_id}" ]]; then
              post_comment_text "Agent fix loop stopped: diagnostics workflow dispatch did not return a run id."
              final_state="diagnostics_run_not_found"
              break
            fi

            ops_gh run watch "${run_id}" --repo "${OPS_REPO}" --exit-status

            iteration_dir="${OUT}/iterations/${iteration}"
            mkdir -p "${iteration_dir}"
            ops_gh run download "${run_id}" --repo "${OPS_REPO}" --dir "${iteration_dir}"

            diagnostics_file="$(find "${iteration_dir}" -name diagnostics.json -print -quit)"
            if [[ -z "${diagnostics_file}" ]]; then
              post_comment_text "Agent fix loop stopped: diagnostics.json was not found in the downloaded artifact."
              final_state="diagnostics_missing"
              break
            fi

            failing="$(jq -r '.check_summary.failing // 0' "${diagnostics_file}")"
            pending="$(jq -r '.check_summary.pending // 0' "${diagnostics_file}")"
            failed_runs="$(jq -r '.run_summary.failures // 0' "${diagnostics_file}")"
            unresolved="$(jq -r '.unresolved_review_threads | length' "${diagnostics_file}")"
            classification="$(classify_failure "${iteration_dir}" "${diagnostics_file}")"
            if [[ "${unresolved}" -gt 0 ]]; then
              resolve_unresolved_review_threads "${iteration_dir}" || true
            fi

            if [[ -n "${last_auto_commit}" ]] && is_worse_than_previous "${failing}" "${failed_runs}" "${unresolved}" "${prev_failing}" "${prev_failed_runs}" "${prev_unresolved}"; then
              rollback_commit "${head_ref}" "${last_auto_commit}"
              post_comment_text "Agent fix loop rolled back auto-patch commit ${last_auto_commit} because diagnostics got worse. Diagnostics run: https://github.com/${OPS_REPO}/actions/runs/${run_id}"
              append_iteration_log "${iteration}" "${run_id}" "${classification}" "rollback" "${last_auto_commit}" "${failing}" "${pending}" "${failed_runs}" "${unresolved}"
              final_state="rolled_back"
              break
            fi

            if diagnostics_clean "${failing}" "${pending}" "${failed_runs}" "${unresolved}"; then
              current_head_sha="$(jq -r '.pr.headRefOid // ""' "${diagnostics_file}")"
              if [[ "$(jq -r '.autonomy.enabled' "${OUT}/policy.json")" != "true" ]]; then
                post_comment_text "**Agent fix loop clean**\n\n- Diagnostics: https://github.com/${OPS_REPO}/actions/runs/${run_id}\n- Finalize: disabled by repository policy"
                append_iteration_log "${iteration}" "${run_id}" "${classification}" "policy_disabled" "" "${failing}" "${pending}" "${failed_runs}" "${unresolved}"
                final_state="policy_disabled"
              elif [[ "$(jq -r '.pr.finalize' "${OUT}/policy.json")" == "true" ]]; then
                finalize_body="${OUT}/finalize-dispatch-${iteration}.json"
                finalize_response="${OUT}/finalize-dispatch-${iteration}-response.json"
                jq -n \
                  --arg target_owner "${TARGET_OWNER}" \
                  --arg target_repo "${TARGET_REPO}" \
                  --arg pr_number "${PR_NUMBER}" \
                  --arg expected_head_sha "${current_head_sha}" \
                  '{
                    ref: "main",
                    inputs: {
                      target_owner: $target_owner,
                      target_repo: $target_repo,
                      pr_number: $pr_number,
                      requested_action: "finalize",
                      expected_head_sha: $expected_head_sha,
                      dry_run: "false"
                    }
                  }' > "${finalize_body}"
                ops_api --method POST \
                  "repos/${OPS_REPO}/actions/workflows/ops-pr-finalize.yml/dispatches" \
                  --input "${finalize_body}" > "${finalize_response}"
                finalize_run_id=""
                if [[ -s "${finalize_response}" ]]; then
                  finalize_run_id="$(jq -r '.workflow_run_id // .id // empty' "${finalize_response}" 2>/dev/null || true)"
                fi
                if [[ -z "${finalize_run_id}" ]]; then
                  sleep 8
                  finalize_run_id="$(ops_gh run list --repo "${OPS_REPO}" --workflow ops-pr-finalize.yml --limit 10 --json databaseId |
                    jq -r '.[0].databaseId // empty')"
                fi
                post_comment_text "**Agent fix loop clean**\n\n- Diagnostics: https://github.com/${OPS_REPO}/actions/runs/${run_id}\n- Finalize: dispatched \`ops-pr-finalize.yml\`${finalize_run_id:+\n- Finalize run: https://github.com/${OPS_REPO}/actions/runs/${finalize_run_id}}"
                append_iteration_log "${iteration}" "${run_id}" "${classification}" "clean_finalize_dispatched" "" "${failing}" "${pending}" "${failed_runs}" "${unresolved}"
                final_state="clean_finalize_dispatched"
              else
                post_comment_text "**Agent fix loop clean**\n\n- Diagnostics: https://github.com/${OPS_REPO}/actions/runs/${run_id}\n- Finalize: disabled by repository policy"
                append_iteration_log "${iteration}" "${run_id}" "${classification}" "clean_finalize_disabled" "" "${failing}" "${pending}" "${failed_runs}" "${unresolved}"
                final_state="clean_finalize_disabled"
              fi
              break
            fi

            if [[ "${classification}" == "pending" ]]; then
              append_iteration_log "${iteration}" "${run_id}" "${classification}" "wait" "" "${failing}" "${pending}" "${failed_runs}" "${unresolved}"
              sleep 45
              continue
            fi

            suggestion="$(suggestion_for_class "${classification}")"
            if [[ "${patch_mode}" == "suggest" ]]; then
              post_comment_text "**Agent fix loop: suggestion mode**\n\n- Classification: \`${classification}\`\n- Diagnostics: https://github.com/${OPS_REPO}/actions/runs/${run_id}\n\n${suggestion}"
              append_iteration_log "${iteration}" "${run_id}" "${classification}" "suggested" "" "${failing}" "${pending}" "${failed_runs}" "${unresolved}"
              final_state="suggested"
              if [[ "${iteration}" -lt "${max_iterations}" ]]; then
                sleep 30
              fi
              continue
            fi

            patch_dir="${WORK}/patch-${iteration}"
            clone_pr_branch "${head_ref}" "${patch_dir}"
            set +e
            apply_patch_for_class "${classification}" "${patch_dir}"
            patch_status="$?"
            set -e

            if [[ "${patch_status}" -eq 2 ]]; then
              post_comment_text "**Agent fix loop stopped**\n\n- Classification: \`${classification}\`\n- Diagnostics: https://github.com/${OPS_REPO}/actions/runs/${run_id}\n- Reason: not safely auto-patchable by the current implementation\n\n${suggestion}"
              append_iteration_log "${iteration}" "${run_id}" "${classification}" "non_patchable" "" "${failing}" "${pending}" "${failed_runs}" "${unresolved}"
              final_state="non_patchable"
              break
            fi

            set +e
            commit_sha="$(commit_and_push_if_changed "${patch_dir}" "${classification}" "${head_ref}")"
            commit_status="$?"
            set -e

            if [[ "${commit_status}" -eq 3 ]]; then
              post_comment_text "Agent fix loop stopped: classification ${classification} produced no working tree diff. Diagnostics run: https://github.com/${OPS_REPO}/actions/runs/${run_id}"
              append_iteration_log "${iteration}" "${run_id}" "${classification}" "no_diff" "" "${failing}" "${pending}" "${failed_runs}" "${unresolved}"
              final_state="no_diff"
              break
            elif [[ "${commit_status}" -ne 0 ]]; then
              post_comment_text "Agent fix loop stopped: push or commit failed for classification ${classification}. Diagnostics run: https://github.com/${OPS_REPO}/actions/runs/${run_id}"
              append_iteration_log "${iteration}" "${run_id}" "${classification}" "push_failed" "" "${failing}" "${pending}" "${failed_runs}" "${unresolved}"
              final_state="push_failed"
              break
            fi

            last_auto_commit="${commit_sha}"
            prev_failing="${failing}"
            prev_failed_runs="${failed_runs}"
            prev_unresolved="${unresolved}"
            append_iteration_log "${iteration}" "${run_id}" "${classification}" "patched" "${commit_sha}" "${failing}" "${pending}" "${failed_runs}" "${unresolved}"
            sleep 30
          done

          jq -s '.' "${ITERATION_LOG}" > "${OUT}/iterations.json"
          jq -n \
            --arg generated_at "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg target "${REPO}" \
            --arg pr_number "${PR_NUMBER}" \
            --arg patch_mode "${patch_mode}" \
            --arg max_iterations "${max_iterations}" \
            --arg final_state "${final_state}" \
            --arg head_ref "${head_ref}" \
            --slurpfile iterations "${OUT}/iterations.json" \
            '{
              generated_at: $generated_at,
              target: $target,
              pr_number: ($pr_number|tonumber),
              head_ref: $head_ref,
              patch_mode: $patch_mode,
              max_iterations: ($max_iterations|tonumber),
              final_state: $final_state,
              iterations: $iterations[0]
            }' > "${REPORT}"

          {
            echo "### Agent Fix Loop v2"
            echo ""
            echo "| Field | Value |"
            echo "|---|---:|"
            echo "| Target | ${REPO} |"
            echo "| PR | #${PR_NUMBER} |"
            echo "| Head branch | ${head_ref} |"
            echo "| Patch mode | ${patch_mode} |"
            echo "| Final state | ${final_state} |"
            echo "| Iterations | $(jq -r 'length' "${OUT}/iterations.json") |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload fix-loop report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: agent-fix-loop-${{ inputs.target_owner }}-${{ inputs.target_repo }}-${{ inputs.pr_number }}
          path: out/
          retention-days: 14
