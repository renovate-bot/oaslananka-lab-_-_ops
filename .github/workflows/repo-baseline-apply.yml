name: Repo Baseline Apply

on:
  workflow_dispatch:
    inputs:
      target_owner:
        description: Target owner or organization
        required: true
        default: oaslananka-lab
        type: string
      target_repo:
        description: Target repository
        required: true
        default: boardguard
        type: string
      apply:
        description: Apply changes. False means dry-run.
        required: true
        default: false
        type: boolean
      approval:
        description: Required when apply=true. Must equal APPLY_BASELINE.
        required: false
        default: ""
        type: string
      enable_security_features:
        description: Enable dependency alerts, dependency graph, secret scanning and push protection.
        required: true
        default: true
        type: boolean
      create_non_disruptive_ruleset:
        description: Create or update main ruleset blocking deletion, force-push, and merge commits.
        required: true
        default: true
        type: boolean
      enforce_actions_policy:
        description: Set selected actions and SHA pinning. Keep false until workflow hardening is done.
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: repo-baseline-apply-${{ inputs.target_owner }}-${{ inputs.target_repo }}
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Create GitHub App token
        id: app
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3
        with:
          client-id: ${{ vars.REPO_OPS_APP_CLIENT_ID }}
          private-key: ${{ secrets.REPO_OPS_APP_PRIVATE_KEY }}
          owner: ${{ inputs.target_owner }}
          repositories: ${{ inputs.target_repo }}

      - name: Apply repository baseline
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
          TARGET_OWNER: ${{ inputs.target_owner }}
          TARGET_REPO: ${{ inputs.target_repo }}
          API_VERSION: "2026-03-10"
          APPLY: ${{ inputs.apply }}
          APPROVAL: ${{ inputs.approval }}
          ENABLE_SECURITY_FEATURES: ${{ inputs.enable_security_features }}
          CREATE_NON_DISRUPTIVE_RULESET: ${{ inputs.create_non_disruptive_ruleset }}
          ENFORCE_ACTIONS_POLICY: ${{ inputs.enforce_actions_policy }}
        shell: bash
        run: |
          set -euo pipefail

          REPO="${TARGET_OWNER}/${TARGET_REPO}"
          OUT="out"
          mkdir -p "${OUT}"
          : > "${OUT}/steps.ndjson"

          api() {
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: ${API_VERSION}" \
              "$@"
          }

          record() {
            local name="$1"
            local status="$2"
            local details="$3"
            jq -n \
              --arg name "$name" \
              --arg status "$status" \
              --arg details "$details" \
              '{name:$name,status:$status,details:$details}' >> "${OUT}/steps.ndjson"
          }

          run_api_step() {
            local name="$1"
            local method="$2"
            local endpoint="$3"
            local input_file="${4:-}"

            local err_file="${OUT}/${name}.err"

            if [[ -n "${input_file}" ]]; then
              if api --method "${method}" "${endpoint}" --input "${input_file}" > "${OUT}/${name}.json" 2> "${err_file}"; then
                record "${name}" "applied" "${method} ${endpoint}"
              else
                record "${name}" "failed" "$(cat "${err_file}")"
              fi
            else
              if api --method "${method}" "${endpoint}" > "${OUT}/${name}.json" 2> "${err_file}"; then
                record "${name}" "applied" "${method} ${endpoint}"
              else
                record "${name}" "failed" "$(cat "${err_file}")"
              fi
            fi
          }

          if [[ "${APPLY}" == "true" && "${APPROVAL}" != "APPLY_BASELINE" ]]; then
            echo "approval must equal APPLY_BASELINE when apply=true" >&2
            exit 1
          fi

          DEFAULT_BRANCH="$(api --method GET "repos/${REPO}" --jq .default_branch)"

          {
            echo "### Repo Baseline Apply"
            echo ""
            echo "| Field | Value |"
            echo "|---|---:|"
            echo "| Target | ${REPO} |"
            echo "| Default branch | ${DEFAULT_BRANCH} |"
            echo "| Apply | ${APPLY} |"
            echo "| Security features | ${ENABLE_SECURITY_FEATURES} |"
            echo "| Non-disruptive ruleset | ${CREATE_NON_DISRUPTIVE_RULESET} |"
            echo "| Enforce actions policy | ${ENFORCE_ACTIONS_POLICY} |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${APPLY}" != "true" ]]; then
            record "dry_run" "planned" "No mutation was performed."
          fi

          if [[ "${ENABLE_SECURITY_FEATURES}" == "true" ]]; then
            if [[ "${APPLY}" == "true" ]]; then
              run_api_step "vulnerability_alerts" "PUT" "repos/${REPO}/vulnerability-alerts"

              jq -n '{
                security_and_analysis: {
                  secret_scanning: {status: "enabled"},
                  secret_scanning_push_protection: {status: "enabled"},
                  secret_scanning_ai_detection: {status: "enabled"},
                  secret_scanning_non_provider_patterns: {status: "enabled"}
                }
              }' > "${OUT}/security-and-analysis.json"

              run_api_step "security_and_analysis" "PATCH" "repos/${REPO}" "${OUT}/security-and-analysis.json"
            else
              record "vulnerability_alerts" "planned" "Would enable vulnerability alerts/dependency graph."
              record "security_and_analysis" "planned" "Would enable secret scanning and push protection."
            fi
          fi

          if [[ "${CREATE_NON_DISRUPTIVE_RULESET}" == "true" ]]; then
            jq -n '{
              name: "repo-ops main baseline",
              target: "branch",
              enforcement: "active",
              conditions: {
                ref_name: {
                  include: ["~DEFAULT_BRANCH"],
                  exclude: []
                }
              },
              rules: [
                {type: "deletion"},
                {type: "non_fast_forward"},
                {type: "required_linear_history"}
              ]
            }' > "${OUT}/main-ruleset.json"

            EXISTING_RULESET_ID="$(
              api --method GET "repos/${REPO}/rulesets" -F includes_parents=false --jq '.[] | select(.name == "repo-ops main baseline") | .id' 2>/dev/null | head -n 1 || true
            )"

            if [[ "${APPLY}" == "true" ]]; then
              if [[ -n "${EXISTING_RULESET_ID}" ]]; then
                run_api_step "main_ruleset" "PUT" "repos/${REPO}/rulesets/${EXISTING_RULESET_ID}" "${OUT}/main-ruleset.json"
              else
                run_api_step "main_ruleset" "POST" "repos/${REPO}/rulesets" "${OUT}/main-ruleset.json"
              fi
            else
              record "main_ruleset" "planned" "Would create/update non-disruptive default-branch ruleset."
            fi
          fi

          if [[ "${ENFORCE_ACTIONS_POLICY}" == "true" ]]; then
            if [[ "${APPLY}" == "true" ]]; then
              jq -n '{
                enabled: true,
                allowed_actions: "selected",
                sha_pinning_required: true
              }' > "${OUT}/actions-permissions.json"

              jq -n '{
                github_owned_allowed: true,
                verified_allowed: false,
                patterns_allowed: []
              }' > "${OUT}/selected-actions.json"

              jq -n '{
                default_workflow_permissions: "read",
                can_approve_pull_request_reviews: false
              }' > "${OUT}/workflow-token.json"

              run_api_step "actions_permissions" "PUT" "repos/${REPO}/actions/permissions" "${OUT}/actions-permissions.json"
              run_api_step "selected_actions" "PUT" "repos/${REPO}/actions/permissions/selected-actions" "${OUT}/selected-actions.json"
              run_api_step "workflow_token_permissions" "PUT" "repos/${REPO}/actions/permissions/workflow" "${OUT}/workflow-token.json"
            else
              record "actions_permissions" "planned" "Would enforce selected actions and SHA pinning."
            fi
          else
            record "actions_permissions" "deferred" "Not enforcing until workflows are audited and SHA-pinned."
          fi

          jq -s '.' "${OUT}/steps.ndjson" > "${OUT}/baseline-apply-report.json"

          {
            echo ""
            echo "#### Mutation report"
            echo ""
            echo "| Step | Status | Details |"
            echo "|---|---:|---|"
            jq -r '.[] | "| \(.name) | \(.status) | \(.details | gsub("\n"; " ")) |"' "${OUT}/baseline-apply-report.json"
            echo ""
            echo "#### Post-check"
          } >> "$GITHUB_STEP_SUMMARY"

          api --method GET "repos/${REPO}" > "${OUT}/repo-after.json" || true
          api --method GET "repos/${REPO}/rules/branches/${DEFAULT_BRANCH}" -F per_page=100 > "${OUT}/active-branch-rules-after.json" || true
          api --method GET "repos/${REPO}/actions/permissions" > "${OUT}/actions-permissions-after.json" || true
          api --method GET "repos/${REPO}/actions/permissions/workflow" > "${OUT}/workflow-token-after.json" || true
          api --method GET "repos/${REPO}/secret-scanning/alerts" -F state=open -F per_page=1 > "${OUT}/secret-scanning-alerts-after.json" 2> "${OUT}/secret-scanning-alerts-after.err" || true
          api --method GET "repos/${REPO}/dependency-graph/sbom" > "${OUT}/sbom-after.json" 2> "${OUT}/sbom-after.err" || true

          echo "- active branch rules: $(jq 'length' "${OUT}/active-branch-rules-after.json" 2>/dev/null || echo unavailable)" >> "$GITHUB_STEP_SUMMARY"
          echo "- actions permissions: $(jq -c '.' "${OUT}/actions-permissions-after.json" 2>/dev/null || echo unavailable)" >> "$GITHUB_STEP_SUMMARY"
          echo "- workflow token permissions: $(jq -c '.' "${OUT}/workflow-token-after.json" 2>/dev/null || echo unavailable)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload apply report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: baseline-apply-${{ inputs.target_owner }}-${{ inputs.target_repo }}
          path: out/
          retention-days: 14
