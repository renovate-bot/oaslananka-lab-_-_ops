name: Repo Multi Onboarding

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: repo-multi-onboarding-group-b
  cancel-in-progress: false

jobs:
  dispatch:
    name: Dispatch onboarding for ${{ matrix.repo }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        repo:
          - mcp-health-monitor
          - mcp-debug-recorder
          - mcp-infra-lens

    steps:
      - name: Dispatch repo onboarding
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_OWNER: oaslananka-lab
          TARGET_REPO: ${{ matrix.repo }}
        shell: bash
        run: |
          set -euo pipefail

          dispatch_body="${RUNNER_TEMP}/repo-onboarding-${TARGET_REPO}.json"
          dispatch_response="${RUNNER_TEMP}/repo-onboarding-${TARGET_REPO}-response.json"
          jq -n \
            --arg ref "${GITHUB_REF_NAME}" \
            --arg target_owner "${TARGET_OWNER}" \
            --arg target_repo "${TARGET_REPO}" \
            '{
              ref: $ref,
              inputs: {
                target_owner: $target_owner,
                target_repo: $target_repo,
                desired_ruleset_profile: "operational",
                repo_role: "org_mirror"
              }
            }' > "${dispatch_body}"

          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/repo-onboarding.yml/dispatches" \
            --input "${dispatch_body}" > "${dispatch_response}"

          run_id="$(jq -r '.workflow_run_id // .id // empty' "${dispatch_response}")"

          {
            echo "### Repo Multi Onboarding"
            echo ""
            echo "| Field | Value |"
            echo "|---|---:|"
            echo "| Target | ${TARGET_OWNER}/${TARGET_REPO} |"
            echo "| Dispatched workflow | repo-onboarding.yml |"
            echo "| Run ID | ${run_id:-unavailable} |"
            echo "| Ref | ${GITHUB_REF_NAME} |"
          } >> "${GITHUB_STEP_SUMMARY}"
