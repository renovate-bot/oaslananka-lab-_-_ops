name: Ops Release Orchestrator

on:
  workflow_dispatch:
    inputs:
      target_owner:
        required: true
        type: string
      target_repo:
        required: true
        type: string
      source_pr:
        required: false
        default: ""
        type: string
      merge_commit_sha:
        required: false
        default: ""
        type: string
      requested_action:
        required: true
        default: release
        type: choice
        options:
          - release
          - publish
          - release_and_publish
      dry_run:
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      source_mirror_gate:
        required: false
        default: ""
        type: string

permissions:
  contents: read
  actions: write

concurrency:
  group: ops-release-orchestrator-${{ inputs.target_owner }}-${{ inputs.target_repo }}
  cancel-in-progress: false

jobs:
  orchestrate:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout _ops
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Create target GitHub App token
        id: app
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3
        with:
          client-id: ${{ vars.REPO_OPS_APP_CLIENT_ID }}
          private-key: ${{ secrets.REPO_OPS_APP_PRIVATE_KEY }}
          owner: ${{ inputs.target_owner }}
          repositories: ${{ inputs.target_repo }}

      - name: Orchestrate release
        env:
          TARGET_TOKEN: ${{ steps.app.outputs.token }}
          OPS_TOKEN: ${{ github.token }}
          TARGET_OWNER: ${{ inputs.target_owner }}
          TARGET_REPO: ${{ inputs.target_repo }}
          SOURCE_PR: ${{ inputs.source_pr }}
          MERGE_COMMIT_SHA: ${{ inputs.merge_commit_sha }}
          REQUESTED_ACTION: ${{ inputs.requested_action }}
          DRY_RUN: ${{ inputs.dry_run }}
          SOURCE_MIRROR_GATE: ${{ inputs.source_mirror_gate }}
          API_VERSION: "2026-03-10"
          OPS_REPO: oaslananka-lab/_ops
        shell: bash
        run: |
          set -euo pipefail

          REPO="${TARGET_OWNER}/${TARGET_REPO}"
          OUT="${GITHUB_WORKSPACE}/out"
          RAW="${OUT}/raw"
          mkdir -p "${RAW}"
          STEPS="${OUT}/steps.ndjson"
          REPORT="${OUT}/release-orchestrator-${TARGET_OWNER}-${TARGET_REPO}.json"
          : > "${STEPS}"

          final_state="release_disabled"
          release_plan_run_id=""
          release_workflow_run_id=""
          publish_workflow_run_id=""
          release_gate_run_id=""
          release_gate_state=""
          release_pr_number=""
          tag_name=""
          publish_state="publish_disabled"

          target_api() {
            GH_TOKEN="${TARGET_TOKEN}" gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: ${API_VERSION}" \
              "$@"
          }

          ops_api() {
            GH_TOKEN="${OPS_TOKEN}" gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: ${API_VERSION}" \
              "$@"
          }

          ops_gh() {
            GH_TOKEN="${OPS_TOKEN}" gh "$@"
          }

          target_gh() {
            GH_TOKEN="${TARGET_TOKEN}" gh "$@"
          }

          record() {
            jq -n --arg name "$1" --arg status "$2" --arg details "$3" \
              '{name:$name,status:$status,details:$details}' >> "${STEPS}"
          }

          write_report() {
            jq -s '.' "${STEPS}" > "${OUT}/steps.json"
            jq -n \
              --arg generated_at "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
              --arg target "${REPO}" \
              --arg source_pr "${SOURCE_PR}" \
              --arg merge_commit_sha "${MERGE_COMMIT_SHA}" \
              --arg requested_action "${REQUESTED_ACTION}" \
              --argjson dry_run "$(if [[ "${DRY_RUN}" == "true" ]]; then echo true; else echo false; fi)" \
              --arg policy_profile "$(jq -r '.autonomy.profile // "unknown"' "${OUT}/policy.json" 2>/dev/null || echo unknown)" \
              --arg release_plan_run_id "${release_plan_run_id}" \
              --arg release_gate_run_id "${release_gate_run_id}" \
              --arg release_gate_state "${release_gate_state}" \
              --arg release_workflow_run_id "${release_workflow_run_id}" \
              --arg publish_workflow_run_id "${publish_workflow_run_id}" \
              --arg release_pr_number "${release_pr_number}" \
              --arg tag_name "${tag_name}" \
              --arg publish_state "${publish_state}" \
              --arg final_state "${final_state}" \
              --slurpfile steps "${OUT}/steps.json" \
              '{
                generated_at: $generated_at,
                target: $target,
                source_pr: (if $source_pr == "" then null else ($source_pr|tonumber) end),
                merge_commit_sha: (if $merge_commit_sha == "" then null else $merge_commit_sha end),
                requested_action: $requested_action,
                dry_run: $dry_run,
                policy_profile: $policy_profile,
                release_plan_run_id: (if $release_plan_run_id == "" then null else ($release_plan_run_id|tonumber) end),
                release_gate_run_id: (if $release_gate_run_id == "" then null else ($release_gate_run_id|tonumber) end),
                release_gate_state: (if $release_gate_state == "" then null else $release_gate_state end),
                release_workflow_run_id: (if $release_workflow_run_id == "" then null else ($release_workflow_run_id|tonumber) end),
                publish_workflow_run_id: (if $publish_workflow_run_id == "" then null else ($publish_workflow_run_id|tonumber) end),
                release_pr_number: (if $release_pr_number == "" then null else ($release_pr_number|tonumber) end),
                tag_name: (if $tag_name == "" then null else $tag_name end),
                publish_state: $publish_state,
                final_state: $final_state,
                steps: $steps[0]
              }' > "${REPORT}"
          }
          trap write_report EXIT

          dispatch_ops_workflow() {
            local workflow="$1"
            local body_file="${RAW}/dispatch-${workflow}.json"
            local response_file="${RAW}/dispatch-${workflow}.json.response"
            shift
            jq -n --arg ref "main" '{ref:$ref,inputs:{}}' > "${body_file}"
            while [[ "$#" -gt 0 ]]; do
              local key="$1"
              local value="$2"
              local next="${body_file}.next"
              jq --arg key "${key}" --arg value "${value}" '.inputs += {($key): $value}' "${body_file}" > "${next}"
              mv "${next}" "${body_file}"
              shift 2
            done
            ops_api --method POST "repos/${OPS_REPO}/actions/workflows/${workflow}/dispatches" \
              --input "${body_file}" > "${response_file}"
            local run_id
            run_id="$(jq -r '.workflow_run_id // .id // empty' "${response_file}")"
            if [[ -z "${run_id}" ]]; then
              sleep 8
              run_id="$(ops_gh run list --repo "${OPS_REPO}" --workflow "${workflow}" --limit 10 --json databaseId |
                jq -r '.[0].databaseId // empty')"
            fi
            [[ -n "${run_id}" ]] || return 1
            echo "${run_id}"
          }

          wait_ops_run() {
            ops_gh run watch "$1" --repo "${OPS_REPO}" --exit-status
          }

          find_existing_release_run() {
            target_gh run list --repo "${REPO}" --workflow "${release_workflow}" --limit 25 \
              --json databaseId,event,status,conclusion,headSha,createdAt,url > "${RAW}/release-workflow-runs.json" || return 0
            if [[ -n "${MERGE_COMMIT_SHA}" ]]; then
              matched="$(jq -r --arg sha "${MERGE_COMMIT_SHA}" '
                map(select(.headSha == $sha)) | first.databaseId // empty
              ' "${RAW}/release-workflow-runs.json")"
              if [[ -n "${matched}" ]]; then
                echo "${matched}"
                return 0
              fi
            fi
            jq -r '
              map(select(.event == "push")) | first.databaseId // empty
            ' "${RAW}/release-workflow-runs.json"
          }

          find_preferred_workflow() {
            local paths_json="$1"
            jq -r --argjson paths "${paths_json}" '
              .workflows as $workflows |
              $paths[] as $path |
              $workflows[]? |
              select(.path == $path) |
              .path
            ' "${RAW}/workflows.json" | head -n 1
          }

          watch_release_run() {
            local run_id="$1"
            [[ -n "${run_id}" ]] || return 1
            local attempt status conclusion
            for attempt in $(seq 1 90); do
              target_gh run view "${run_id}" --repo "${REPO}" --json status,conclusion,jobs,url \
                > "${RAW}/release-run-${run_id}.json"
              status="$(jq -r '.status // ""' "${RAW}/release-run-${run_id}.json")"
              conclusion="$(jq -r '.conclusion // ""' "${RAW}/release-run-${run_id}.json")"
              if [[ "${status}" == "completed" ]]; then
                [[ "${conclusion}" == "success" ]] && return 0
                return 1
              fi
              if jq -e '.jobs[]? | select(.status == "waiting")' "${RAW}/release-run-${run_id}.json" >/dev/null; then
                if [[ "$(jq -r '.publish.enabled' "${OUT}/policy.json")" != "true" ]]; then
                  return 2
                fi
                return 3
              fi
              sleep 10
            done
            return 3
          }

          handle_release_run() {
            local run_id="$1"
            local status_label="$2"
            local rc
            set +e
            watch_release_run "${run_id}"
            rc="$?"
            set -e
            case "${rc}" in
              0)
                final_state="release_workflow_dispatched"
                record "release_workflow" "${status_label}" "${release_workflow} run_id=${run_id}"
                return 0
                ;;
              2)
                final_state="release_workflow_dispatched"
                record "release_workflow" "publish_gate_reached" "${release_workflow} run_id=${run_id}"
                return 0
                ;;
              3)
                final_state="awaiting_environment_approval"
                record "release_workflow" "awaiting_environment_approval" "run_id=${run_id}"
                return 0
                ;;
              *)
                final_state="release_workflow_failed"
                record "release_workflow" "failed" "run_id=${run_id}"
                return 1
                ;;
            esac
          }

          node scripts/ops-policy.mjs get --owner "${TARGET_OWNER}" --repo "${TARGET_REPO}" > "${OUT}/policy.json"
          node scripts/ops-policy.mjs check --owner "${TARGET_OWNER}" --repo "${TARGET_REPO}" >/dev/null
          record "policy" "loaded" "${REPO}"

          release_requested=false
          publish_requested=false
          if [[ "${REQUESTED_ACTION}" == "release" || "${REQUESTED_ACTION}" == "release_and_publish" ]]; then
            release_requested=true
          fi
          if [[ "${REQUESTED_ACTION}" == "publish" || "${REQUESTED_ACTION}" == "release_and_publish" ]]; then
            publish_requested=true
          fi

          if [[ "${SOURCE_MIRROR_GATE}" != "passed" ]]; then
            release_gate_run_id="$(dispatch_ops_workflow repo-source-mirror-release-gate.yml target_owner "${TARGET_OWNER}" target_repo "${TARGET_REPO}" release_ref "main" requested_action "${REQUESTED_ACTION}" dispatch_orchestrator "false")" || {
              final_state="validation_missing"
              release_gate_state="dispatch_failed"
              record "source_mirror_gate" "dispatch_failed" "repo-source-mirror-release-gate.yml"
              exit 0
            }
            if ! wait_ops_run "${release_gate_run_id}"; then
              final_state="validation_missing"
              release_gate_state="workflow_failed"
              record "source_mirror_gate" "failed" "run_id=${release_gate_run_id}"
              exit 0
            fi
            mkdir -p "${RAW}/release-gate"
            if ops_gh run download "${release_gate_run_id}" --repo "${OPS_REPO}" --name "source-mirror-release-gate-${TARGET_OWNER}-${TARGET_REPO}" --dir "${RAW}/release-gate" >/dev/null 2>&1; then
              gate_report="$(find "${RAW}/release-gate" -name 'source-mirror-release-gate-*.json' | head -n 1)"
              if [[ -n "${gate_report}" ]]; then
                release_gate_state="$(jq -r '.final_state // "unknown"' "${gate_report}")"
              fi
            fi
            release_gate_state="${release_gate_state:-unknown}"
            record "source_mirror_gate" "${release_gate_state}" "run_id=${release_gate_run_id}"
            case "${release_gate_state}" in
              ready)
                ;;
              publish_disabled)
                publish_state="publish_disabled"
                if [[ "${publish_requested}" == "true" && "${release_requested}" != "true" ]]; then
                  final_state="publish_disabled"
                  exit 0
                fi
                ;;
              promote_back_required|source_mirror_mismatch|validation_missing|policy_invalid)
                final_state="${release_gate_state}"
                exit 0
                ;;
              *)
                final_state="validation_missing"
                exit 0
                ;;
            esac
          else
            release_gate_state="passed"
            record "source_mirror_gate" "passed" "prevalidated"
          fi

          if [[ "${release_requested}" == "true" && "$(jq -r '.release.enabled' "${OUT}/policy.json")" != "true" ]]; then
            final_state="release_disabled"
            record "release" "disabled" "policy release.enabled=false"
          else
            release_plan_run_id="$(dispatch_ops_workflow repo-release-plan.yml target_owner "${TARGET_OWNER}" target_repo "${TARGET_REPO}")" || {
              final_state="release_plan_failed"
              record "release_plan" "dispatch_failed" "repo-release-plan.yml"
              exit 0
            }
            if ! wait_ops_run "${release_plan_run_id}"; then
              final_state="release_plan_failed"
              record "release_plan" "failed" "run_id=${release_plan_run_id}"
              exit 0
            fi
            record "release_plan" "success" "run_id=${release_plan_run_id}"

            target_api --method GET "repos/${REPO}/actions/workflows" -F per_page=100 > "${RAW}/workflows.json"
            release_workflow="$(find_preferred_workflow '[
              ".github/workflows/release.yml",
              ".github/workflows/release-please.yml"
            ]')"
            publish_workflow="$(find_preferred_workflow '[
              ".github/workflows/publish-production.yml",
              ".github/workflows/publish.yml",
              ".github/workflows/npm-publish.yml",
              ".github/workflows/marketplace-publish.yml",
              ".github/workflows/vscode-publish.yml",
              ".github/workflows/open-vsx-publish.yml",
              ".github/workflows/mcp-registry-publish.yml",
              ".github/workflows/release.yml",
              ".github/workflows/release-please.yml"
            ]')"
            if [[ -n "${publish_workflow}" ]]; then
              record "publish_workflow" "found" "${publish_workflow}"
            fi

            if [[ "${release_requested}" == "true" ]]; then
              if [[ -z "${release_workflow}" ]]; then
                final_state="release_workflow_not_found"
                record "release_workflow" "not_found" "release.yml or release-please.yml"
              elif [[ "${DRY_RUN}" == "true" ]]; then
                final_state="release_workflow_dispatched"
                record "release_workflow" "dry_run" "${release_workflow}"
              else
                before="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                if ! target_gh workflow run "${release_workflow}" --repo "${REPO}" --ref main 2> "${RAW}/release-workflow-dispatch.err"; then
                  release_workflow_run_id="$(find_existing_release_run)"
                  if [[ -z "${release_workflow_run_id}" ]]; then
                    final_state="release_workflow_failed"
                    record "release_workflow" "dispatch_failed" "${release_workflow}"
                    exit 0
                  fi
                  if ! handle_release_run "${release_workflow_run_id}" "observed_push_run_success"; then
                    exit 0
                  fi
                else
                  sleep 8
                  release_workflow_run_id="$(target_gh run list --repo "${REPO}" --workflow "${release_workflow}" --limit 10 --json databaseId,createdAt |
                    jq -r --arg before "${before}" 'map(select(.createdAt >= $before)) | first.databaseId // .[0].databaseId // empty')"
                  if [[ -n "${release_workflow_run_id}" ]]; then
                    if ! handle_release_run "${release_workflow_run_id}" "success"; then
                      exit 0
                    fi
                  else
                    final_state="release_workflow_dispatched"
                    record "release_workflow" "success" "${release_workflow} run_id="
                  fi
                fi
              fi

              target_gh pr list --repo "${REPO}" --state open --json number,title,headRefName,author \
                > "${RAW}/release-prs.json" || echo "[]" > "${RAW}/release-prs.json"
              release_pr_number="$(jq -r '.[] | select((.headRefName // "" | test("release-please"; "i")) or (.title // "" | test("release|chore\\(main\\): release"; "i"))) | .number' "${RAW}/release-prs.json" | head -n 1)"
              if [[ -n "${release_pr_number}" && "$(jq -r '.release.merge_release_pr' "${OUT}/policy.json")" != "true" ]]; then
                final_state="release_pr_open_merge_disabled"
                record "release_pr" "open_merge_disabled" "#${release_pr_number}"
              elif [[ -n "${release_pr_number}" ]]; then
                final_state="release_pr_finalize_dispatched"
                record "release_pr" "finalize_requested" "#${release_pr_number}"
              elif [[ "${final_state}" == "release_workflow_dispatched" ]]; then
                final_state="release_complete"
              fi
            fi
          fi

          if [[ "${publish_requested}" == "true" || "${release_requested}" == "true" ]]; then
            if [[ "$(jq -r '.publish.enabled' "${OUT}/policy.json")" != "true" ]]; then
              publish_state="publish_disabled"
              if [[ "${publish_requested}" == "true" ]]; then
                final_state="publish_disabled"
              fi
              record "publish" "disabled" "policy publish.enabled=false"
            elif [[ -z "${publish_workflow}" ]]; then
              final_state="publish_workflow_not_found"
              publish_state="publish_workflow_not_found"
              record "publish_workflow" "not_found" "publish workflow missing"
            elif [[ "${DRY_RUN}" == "true" ]]; then
              final_state="publish_workflow_dispatched"
              publish_state="dry_run"
              record "publish_workflow" "dry_run" "${publish_workflow}"
            else
              publish_ref="${MERGE_COMMIT_SHA}"
              if [[ -z "${publish_ref}" ]]; then
                target_api --method GET "repos/${REPO}/commits/main" > "${RAW}/publish-ref-commit.json"
                publish_ref="$(jq -r '.sha // empty' "${RAW}/publish-ref-commit.json")"
              fi
              if [[ ! "${publish_ref}" =~ ^[0-9a-fA-F]{40}$ ]]; then
                final_state="publish_workflow_failed"
                publish_state="publish_ref_unresolved"
                record "publish_workflow" "publish_ref_unresolved" "could not resolve immutable main commit SHA"
                exit 0
              fi
              before="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
              if [[ "${publish_workflow}" == ".github/workflows/publish-production.yml" ]]; then
                if ! target_gh workflow run "${publish_workflow}" --repo "${REPO}" --ref main -f ref="${publish_ref}" 2> "${RAW}/publish-workflow-dispatch.err"; then
                  final_state="publish_workflow_failed"
                  publish_state="publish_workflow_dispatch_failed"
                  record "publish_workflow" "dispatch_failed" "$(cat "${RAW}/publish-workflow-dispatch.err")"
                fi
              else
                if ! target_gh workflow run "${publish_workflow}" --repo "${REPO}" --ref main 2> "${RAW}/publish-workflow-dispatch.err"; then
                  final_state="publish_workflow_failed"
                  publish_state="publish_workflow_dispatch_failed"
                  record "publish_workflow" "dispatch_failed" "$(cat "${RAW}/publish-workflow-dispatch.err")"
                fi
              fi
              if [[ "${publish_state}" != "publish_workflow_dispatch_failed" ]]; then
                sleep 8
                publish_workflow_run_id="$(target_gh run list --repo "${REPO}" --workflow "${publish_workflow}" --limit 10 --json databaseId,createdAt |
                  jq -r --arg before "${before}" 'map(select(.createdAt >= $before)) | first.databaseId // .[0].databaseId // empty')"
                if [[ -z "${publish_workflow_run_id}" ]]; then
                  final_state="publish_workflow_dispatched"
                  publish_state="publish_workflow_dispatched"
                  record "publish_workflow" "dispatched" "${publish_workflow} run_id="
                else
                  set +e
                  watch_release_run "${publish_workflow_run_id}"
                  publish_rc="$?"
                  set -e
                  case "${publish_rc}" in
                    0)
                      final_state="release_publish_complete"
                      publish_state="published"
                      record "publish_workflow" "success" "${publish_workflow} run_id=${publish_workflow_run_id}"
                      ;;
                    3)
                      final_state="awaiting_environment_approval"
                      publish_state="awaiting_environment_approval"
                      record "publish_workflow" "awaiting_environment_approval" "${publish_workflow} run_id=${publish_workflow_run_id}"
                      ;;
                    *)
                      final_state="publish_workflow_failed"
                      publish_state="publish_workflow_failed"
                      record "publish_workflow" "failed" "${publish_workflow} run_id=${publish_workflow_run_id}"
                      ;;
                  esac
                fi
              fi
            fi
          fi

          {
            echo "### Ops Release Orchestrator"
            echo ""
            echo "| Field | Value |"
            echo "|---|---:|"
            echo "| Target | ${REPO} |"
            echo "| Requested action | ${REQUESTED_ACTION} |"
            echo "| Final state | ${final_state} |"
            echo "| Publish state | ${publish_state} |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload release orchestrator report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-orchestrator-${{ inputs.target_owner }}-${{ inputs.target_repo }}
          path: out/
          retention-days: 14
