name: Repo Fleet Security State

on:
  workflow_dispatch:
  schedule:
    - cron: "45 5 * * *"

permissions:
  contents: read

concurrency:
  group: repo-fleet-security-state
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - id: lab_app
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3
        with:
          client-id: ${{ vars.REPO_OPS_APP_CLIENT_ID }}
          private-key: ${{ secrets.REPO_OPS_APP_PRIVATE_KEY }}
          owner: oaslananka-lab
      - id: source_app
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3
        with:
          client-id: ${{ vars.REPO_OPS_APP_CLIENT_ID }}
          private-key: ${{ secrets.REPO_OPS_APP_PRIVATE_KEY }}
          owner: oaslananka
      - run: node scripts/fleet-security-state.mjs
        env:
          GH_TOKEN_LAB: ${{ steps.lab_app.outputs.token }}
          GH_TOKEN_SOURCE: ${{ steps.source_app.outputs.token }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: fleet-security-state
          path: out/fleet-security-state.json
          retention-days: 14
