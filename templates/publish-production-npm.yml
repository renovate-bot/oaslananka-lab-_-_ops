name: Publish Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA to publish
        required: true
  release:
    types: [published]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_VERSION: '24.15.0'
  NPM_VERSION: '11.6.2'

defaults:
  run:
    shell: bash

concurrency:
  group: publish-production-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  verify-package:
    if: ${{ github.repository == '__TARGET_REPOSITORY__' }}
    outputs:
      publish_ref: ${{ steps.ref.outputs.value }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Resolve publish ref
        id: ref
        env:
          INPUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          ref="${INPUT_REF:-${GITHUB_SHA}}"
          if [[ ! "${ref}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "INVALID_PUBLISH_REF" >&2
            echo "Publish ref must resolve to a 40-character commit SHA." >&2
            exit 1
          fi
          echo "value=${ref}" >> "${GITHUB_OUTPUT}"
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ steps.ref.outputs.value }}
          fetch-depth: 0
          persist-credentials: false
      - name: Verify publish ref is on release channel
        env:
          PUBLISH_REF: ${{ steps.ref.outputs.value }}
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin main
          if ! git merge-base --is-ancestor "${PUBLISH_REF}" origin/main; then
            echo "PUBLISH_REF_NOT_ON_RELEASE_CHANNEL" >&2
            echo "Ref must be reachable from origin/main." >&2
            exit 1
          fi
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: ''
      - name: Install package manager and build
        run: |
          set -euo pipefail
          mkdir -p publish-artifact
          if [[ -f pnpm-lock.yaml ]]; then
            corepack enable
            corepack install
            corepack pnpm install --frozen-lockfile
            corepack pnpm run build --if-present
            corepack pnpm run prepublishOnly --if-present
            corepack pnpm pack --pack-destination publish-artifact
          else
            if [[ -f package-lock.json || -f npm-shrinkwrap.json ]]; then npm ci; else npm install; fi
            npm rebuild better-sqlite3 --if-present
            npm run build --if-present
            npm run prepublishOnly --if-present
            npm pack --pack-destination publish-artifact
          fi
          node --input-type=commonjs -e "const p=require('./package.json'); if (!p.name || !p.version) throw new Error('package.json name/version is required'); console.log(p.name + '@' + p.version);"
      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: npm-package
          path: publish-artifact/*.tgz
          if-no-files-found: error

  npm-publish:
    if: ${{ github.repository == '__TARGET_REPOSITORY__' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: verify-package
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: npm-package
          path: publish-artifact
      - name: Setup Node.js for npm publish
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org
          cache: ''
      - name: Use npm for trusted publishing
        run: npx --yes "npm@${NPM_VERSION}" --version
      - name: Publish to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          FALLBACK_NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p out
          write_report() {
            local state="$1"
            local result="$2"
            local blocker="$3"
            REPORT_CHANNEL="npm" \
            REPORT_STATE="${state}" \
            REPORT_RESULT="${result}" \
            REPORT_BLOCKER="${blocker}" \
            REPORT_PACKAGE="${package_name:-}" \
            REPORT_VERSION="${package_version:-}" \
            node <<'NODE'
          const fs = require("fs");
          const report = {
            channel: process.env.REPORT_CHANNEL,
            state: process.env.REPORT_STATE,
            result: process.env.REPORT_RESULT,
            blocker: process.env.REPORT_BLOCKER,
            package: process.env.REPORT_PACKAGE,
            version: process.env.REPORT_VERSION,
            run_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            evidence: [],
          };
          fs.writeFileSync("out/publish-report-npm.json", `${JSON.stringify(report, null, 2)}\n`);
          NODE
          }
          token="${NPM_TOKEN:-${FALLBACK_NODE_AUTH_TOKEN:-}}"
          if [[ -n "${token}" ]]; then
            printf '//registry.npmjs.org/:_authToken=%s\n' "${token}" > "${HOME}/.npmrc"
            export NODE_AUTH_TOKEN="${token}"
          else
            unset NODE_AUTH_TOKEN
            if [[ -n "${NPM_CONFIG_USERCONFIG:-}" && -f "${NPM_CONFIG_USERCONFIG}" ]]; then
              sed -i '/_authToken/d' "${NPM_CONFIG_USERCONFIG}"
            fi
            if [[ -f "${HOME}/.npmrc" ]]; then
              sed -i '/_authToken/d' "${HOME}/.npmrc"
            fi
          fi
          package_file="$(find publish-artifact -maxdepth 1 -type f -name '*.tgz' -print -quit)"
          if [[ -z "${package_file}" ]]; then
            echo "NPM_PACKAGE_ARTIFACT_MISSING" >&2
            exit 1
          fi
          package_file="$(realpath "${package_file}")"
          package_json="$(mktemp --suffix=.json)"
          tar -xOf "${package_file}" package/package.json > "${package_json}"
          package_name="$(node -e "const p=require(process.argv[1]); console.log(p.name || '')" "${package_json}")"
          package_version="$(node -e "const p=require(process.argv[1]); console.log(p.version || '')" "${package_json}")"
          if [[ -z "${package_name}" || -z "${package_version}" ]]; then
            echo "NPM_PACKAGE_METADATA_INVALID" >&2
            write_report "failed" "workflow_failure" "NPM_PACKAGE_METADATA_INVALID"
            exit 1
          fi
          if npx --yes "npm@${NPM_VERSION}" view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "NPM_PACKAGE_VERSION_ALREADY_PUBLISHED"
            write_report "already_published" "idempotent_noop" ""
            exit 0
          fi
          publish_log="$(mktemp)"
          set +e
          npx --yes "npm@${NPM_VERSION}" publish "${package_file}" --provenance --access public >"${publish_log}" 2>&1
          status="$?"
          set -e
          if [[ "${status}" -ne 0 ]]; then
            if grep -Eiq "(already exists|cannot publish over|previously published|forbidden.*pre-existing version|cannot modify pre-existing version)" "${publish_log}"; then
              echo "NPM_PACKAGE_VERSION_ALREADY_PUBLISHED"
              write_report "already_published" "idempotent_noop" ""
              cat "${publish_log}"
              exit 0
            fi
            if grep -Eiq "(E401|E403|ENEEDAUTH|HTTP[[:space:]/_-]*401|HTTP[[:space:]/_-]*403|(^|[^[:alnum:]])401([^[:alnum:]]|$)|(^|[^[:alnum:]])403([^[:alnum:]]|$)|(^|[^[:alnum:]])forbidden([^[:alnum:]]|$)|authorization|permission[[:space:]]+denied|not[[:space:]]+authorized)" "${publish_log}"; then
              if [[ -z "${token}" ]]; then
                echo "NPM_TRUSTED_PUBLISHING_NOT_CONFIGURED" >&2
                echo "NPM_TOKEN_SECRET_MISSING" >&2
                write_report "failed" "external_blocker" "NPM_TRUSTED_PUBLISHING_NOT_CONFIGURED"
              else
                echo "NPM_REGISTRY_PERMISSION_DENIED" >&2
                write_report "failed" "external_blocker" "NPM_REGISTRY_PERMISSION_DENIED"
              fi
            elif grep -Eiq "(E404|not found|name.*unavailable)" "${publish_log}"; then
              echo "NPM_PACKAGE_NAME_UNAVAILABLE" >&2
              write_report "failed" "external_blocker" "NPM_PACKAGE_NAME_UNAVAILABLE"
            else
              echo "NPM_PUBLISH_FAILED" >&2
              write_report "failed" "workflow_failure" "NPM_PUBLISH_FAILED"
            fi
            cat "${publish_log}" >&2
            exit "${status}"
          fi
          cat "${publish_log}"
          write_report "published" "fresh_publish_success" ""
      - name: Upload npm publish report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: publish-report-${{ github.event.repository.name }}-npm
          path: out/publish-report-npm.json
          if-no-files-found: ignore
