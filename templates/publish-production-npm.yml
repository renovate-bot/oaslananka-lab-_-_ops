name: Publish Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Ref/tag/SHA to publish
        required: false
        default: main
  release:
    types: [published]
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: publish-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-package:
    if: ${{ github.repository == '__TARGET_REPOSITORY__' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - name: Verify package metadata
        run: |
          test -f package.json || { echo "NPM_PACKAGE_JSON_MISSING"; exit 1; }
          node -e "const p=require('./package.json'); if(!p.name||!p.version){throw new Error('NPM_PACKAGE_METADATA_MISSING')}"

  npm-publish:
    if: ${{ github.repository == '__TARGET_REPOSITORY__' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: verify-package
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ inputs.ref || github.ref }}
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then corepack enable && corepack pnpm install --frozen-lockfile; else npm install; fi
      - name: Build
        run: npm run build --if-present
      - name: Test
        run: npm test --if-present
      - name: Configure fallback npm token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          token="${NPM_TOKEN:-${NODE_AUTH_TOKEN:-}}"
          if [ -n "$token" ]; then
            printf "//registry.npmjs.org/:_authToken=%s\n" "$token" > ~/.npmrc
            echo "NODE_AUTH_TOKEN=${token}" >> "$GITHUB_ENV"
          fi
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ env.NODE_AUTH_TOKEN }}
        run: |
          set +e
          output="$(npm publish --provenance --access public 2>&1)"
          status="$?"
          set -e
          printf '%s\n' "$output"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if printf '%s\n' "$output" | grep -Eiq 'ENEEDAUTH|E401|auth'; then
            echo "NPM_TRUSTED_PUBLISHING_NOT_CONFIGURED"
            echo "NPM_TOKEN_SECRET_MISSING"
          elif printf '%s\n' "$output" | grep -Eiq 'E403|forbidden|permission'; then
            echo "NPM_REGISTRY_PERMISSION_DENIED"
          elif printf '%s\n' "$output" | grep -Eiq 'E404|not found|name.*unavailable'; then
            echo "NPM_PACKAGE_NAME_UNAVAILABLE"
          fi
          exit "$status"
