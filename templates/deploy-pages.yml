name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.repository == '__TARGET_REPOSITORY__' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: "."
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
      - name: Write Pages publish report
        if: always()
        run: |
          mkdir -p out
          node -e 'const fs=require("fs"); const ok="${{ job.status }}"==="success"; fs.writeFileSync("out/publish-report-github-pages.json", JSON.stringify({channel:"github_pages",state:ok?"published":"failed",result:ok?"fresh_publish_success":"workflow_failure",blocker:ok?"":"GITHUB_PAGES_DEPLOY_FAILED",package:"",version:"",run_url:process.env.GITHUB_SERVER_URL+"/"+process.env.GITHUB_REPOSITORY+"/actions/runs/"+process.env.GITHUB_RUN_ID,evidence:[]}, null, 2)+"\n")'
      - name: Upload Pages publish report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: publish-report-${{ github.event.repository.name }}-github-pages
          path: out/publish-report-github-pages.json
          if-no-files-found: ignore
