name: Publish Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA to publish
        required: true
  release:
    types: [published]

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: publish-production-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  build-package:
    if: ${{ github.repository == '__TARGET_REPOSITORY__' }}
    outputs:
      publish_ref: ${{ steps.ref.outputs.value }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Resolve publish ref
        id: ref
        env:
          INPUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          ref="${INPUT_REF:-${GITHUB_SHA}}"
          if [[ ! "${ref}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "INVALID_PUBLISH_REF" >&2
            echo "Publish ref must resolve to a 40-character commit SHA." >&2
            exit 1
          fi
          echo "value=${ref}" >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ steps.ref.outputs.value }}
          fetch-depth: 0
          persist-credentials: false
      - name: Verify publish ref is on release channel
        env:
          PUBLISH_REF: ${{ steps.ref.outputs.value }}
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin main
          if ! git merge-base --is-ancestor "${PUBLISH_REF}" origin/main; then
            echo "PUBLISH_REF_NOT_ON_RELEASE_CHANNEL" >&2
            echo "Ref must be reachable from origin/main." >&2
            exit 1
          fi
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
      - name: Build distributions
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build
          python -m build
          test -d dist
          ls -l dist
      - name: Upload Python distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  pypi-publish:
    if: ${{ github.repository == '__TARGET_REPOSITORY__' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: build-package
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-distributions
          path: dist
      - name: Publish to PyPI
        id: publish
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Write PyPI publish report
        if: always()
        env:
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
        run: |
          set -euo pipefail
          mkdir -p out
          if [[ "${PUBLISH_OUTCOME}" == "success" ]]; then
            state="published"
            result="fresh_publish_success"
            blocker=""
          else
            state="failed"
            result="external_blocker"
            blocker="PYPI_TRUSTED_PUBLISHING_NOT_CONFIGURED"
          fi
          REPORT_STATE="${state}" REPORT_RESULT="${result}" REPORT_BLOCKER="${blocker}" node -e 'const fs=require("fs"); fs.writeFileSync("out/publish-report-pypi.json", JSON.stringify({channel:"pypi",state:process.env.REPORT_STATE,result:process.env.REPORT_RESULT,blocker:process.env.REPORT_BLOCKER,package:"",version:"",run_url:process.env.GITHUB_SERVER_URL+"/"+process.env.GITHUB_REPOSITORY+"/actions/runs/"+process.env.GITHUB_RUN_ID,evidence:[]}, null, 2)+"\n")'
          if [[ "${PUBLISH_OUTCOME}" != "success" ]]; then
            echo "PYPI_TRUSTED_PUBLISHING_NOT_CONFIGURED" >&2
            exit 1
          fi
      - name: Upload PyPI publish report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: publish-report-${{ github.event.repository.name }}-pypi
          path: out/publish-report-pypi.json
          if-no-files-found: ignore
