name: Publish Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Commit SHA to publish
        required: true
  release:
    types: [published]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_VERSION: "24.15.0"
  MCP_PUBLISHER_VERSION: "1.7.9"
  VSCE_VERSION: "3.9.1"
  OVSX_VERSION: "0.10.12"
  PYPI_DIRECTORY: "__PYPI_DIRECTORY__"
  VSCODE_DIRECTORY: "__VSCODE_DIRECTORY__"

defaults:
  run:
    shell: bash

concurrency:
  group: publish-production-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  build-python:
    if: ${{ github.repository == '__TARGET_REPOSITORY__' }}
    outputs:
      publish_ref: ${{ steps.ref.outputs.value }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Resolve publish ref
        id: ref
        env:
          INPUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          ref="${INPUT_REF:-${GITHUB_SHA}}"
          if [[ ! "${ref}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "INVALID_PUBLISH_REF" >&2
            echo "Publish ref must resolve to a 40-character commit SHA." >&2
            exit 1
          fi
          echo "value=${ref}" >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ steps.ref.outputs.value }}
          fetch-depth: 0
          persist-credentials: false
      - name: Verify publish ref is on release channel
        env:
          PUBLISH_REF: ${{ steps.ref.outputs.value }}
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin main
          if ! git merge-base --is-ancestor "${PUBLISH_REF}" origin/main; then
            echo "PUBLISH_REF_NOT_ON_RELEASE_CHANNEL" >&2
            echo "Ref must be reachable from origin/main." >&2
            exit 1
          fi
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
      - name: Build Python distributions
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip build
          cd "${PYPI_DIRECTORY}"
          python -m build
          test -d dist
          ls -l dist
      - name: Upload Python distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-distributions
          path: __PYPI_DIRECTORY__/dist/*
          if-no-files-found: error

  pypi-publish:
    if: ${{ github.repository == '__TARGET_REPOSITORY__' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: build-python
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download Python distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: python-distributions
          path: dist
      - name: Publish to PyPI
        id: publish
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Write PyPI publish report
        if: always()
        env:
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
        run: |
          set -euo pipefail
          mkdir -p out
          if [[ "${PUBLISH_OUTCOME}" == "success" ]]; then
            state="published"
            result="fresh_publish_success"
            blocker=""
          else
            state="failed"
            result="external_blocker"
            blocker="PYPI_TRUSTED_PUBLISHING_NOT_CONFIGURED"
          fi
          REPORT_STATE="${state}" REPORT_RESULT="${result}" REPORT_BLOCKER="${blocker}" node -e 'const fs=require("fs"); fs.writeFileSync("out/publish-report-pypi.json", JSON.stringify({channel:"pypi",state:process.env.REPORT_STATE,result:process.env.REPORT_RESULT,blocker:process.env.REPORT_BLOCKER,package:"",version:"",run_url:process.env.GITHUB_SERVER_URL+"/"+process.env.GITHUB_REPOSITORY+"/actions/runs/"+process.env.GITHUB_RUN_ID,evidence:[]}, null, 2)+"\n")'
          if [[ "${PUBLISH_OUTCOME}" != "success" ]]; then
            echo "PYPI_TRUSTED_PUBLISHING_NOT_CONFIGURED" >&2
            exit 1
          fi
      - name: Upload PyPI publish report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: publish-report-${{ github.event.repository.name }}-pypi
          path: out/publish-report-pypi.json
          if-no-files-found: ignore

  mcp-registry-publish:
    if: ${{ github.repository == '__TARGET_REPOSITORY__' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: production
    needs:
      - build-python
      - pypi-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.build-python.outputs.publish_ref }}
          persist-credentials: false
      - name: Verify server metadata
        run: |
          mkdir -p out
          if [[ ! -f "${PYPI_DIRECTORY}/server.json" ]]; then
            echo "MCP_REGISTRY_CONFIG_MISSING"
            node -e 'const fs=require("fs"); fs.writeFileSync("out/publish-report-mcp-registry.json", JSON.stringify({channel:"mcp_registry",state:"failed",result:"external_blocker",blocker:"MCP_REGISTRY_CONFIG_MISSING",package:"",version:"",run_url:process.env.GITHUB_SERVER_URL+"/"+process.env.GITHUB_REPOSITORY+"/actions/runs/"+process.env.GITHUB_RUN_ID,evidence:["server.json missing in __PYPI_DIRECTORY__"]}, null, 2)+"\n")'
            exit 1
          fi
      - name: Install mcp-publisher
        run: |
          set -euo pipefail
          arch="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          os="$(uname -s | tr '[:upper:]' '[:lower:]')"
          asset="mcp-publisher_${os}_${arch}.tar.gz"
          base_url="https://github.com/modelcontextprotocol/registry/releases/download/v${MCP_PUBLISHER_VERSION}"
          tmp="$(mktemp -d)"
          curl -fsSL "${base_url}/${asset}" -o "${tmp}/${asset}"
          curl -fsSL "${base_url}/registry_${MCP_PUBLISHER_VERSION}_checksums.txt" -o "${tmp}/checksums.txt"
          grep "  ${asset}$" "${tmp}/checksums.txt" > "${tmp}/checksums.filtered"
          (cd "${tmp}" && sha256sum -c checksums.filtered)
          tar -xzf "${tmp}/${asset}" -C "${tmp}" mcp-publisher
          sudo install -m 0755 "${tmp}/mcp-publisher" /usr/local/bin/mcp-publisher
      - name: Login via GitHub OIDC
        run: mcp-publisher login github-oidc
      - name: Validate server.json
        run: |
          set +e
          output="$(cd "${PYPI_DIRECTORY}" && mcp-publisher publish --dry-run 2>&1)"
          status="$?"
          set -e
          printf '%s\n' "${output}"
          if [[ "${status}" -eq 0 ]]; then
            exit 0
          fi
          node -e 'const fs=require("fs"); fs.writeFileSync("out/publish-report-mcp-registry.json", JSON.stringify({channel:"mcp_registry",state:"failed",result:"external_blocker",blocker:"MCP_REGISTRY_EXTERNAL_CONFIGURATION_REQUIRED",package:"",version:"",run_url:process.env.GITHUB_SERVER_URL+"/"+process.env.GITHUB_REPOSITORY+"/actions/runs/"+process.env.GITHUB_RUN_ID,evidence:["mcp-publisher dry-run failed"]}, null, 2)+"\n")'
          exit "${status}"
      - name: Publish to MCP Registry
        run: |
          set +e
          output="$(cd "${PYPI_DIRECTORY}" && mcp-publisher publish 2>&1)"
          status="$?"
          set -e
          printf '%s\n' "${output}"
          if [[ "${status}" -eq 0 ]]; then
            node -e 'const fs=require("fs"); fs.writeFileSync("out/publish-report-mcp-registry.json", JSON.stringify({channel:"mcp_registry",state:"published",result:"fresh_publish_success",blocker:"",package:"",version:"",run_url:process.env.GITHUB_SERVER_URL+"/"+process.env.GITHUB_REPOSITORY+"/actions/runs/"+process.env.GITHUB_RUN_ID,evidence:["mcp-publisher publish exited 0"]}, null, 2)+"\n")'
            exit 0
          fi
          node -e 'const fs=require("fs"); fs.writeFileSync("out/publish-report-mcp-registry.json", JSON.stringify({channel:"mcp_registry",state:"failed",result:"external_blocker",blocker:"MCP_REGISTRY_EXTERNAL_CONFIGURATION_REQUIRED",package:"",version:"",run_url:process.env.GITHUB_SERVER_URL+"/"+process.env.GITHUB_REPOSITORY+"/actions/runs/"+process.env.GITHUB_RUN_ID,evidence:["mcp-publisher publish failed"]}, null, 2)+"\n")'
          exit "${status}"
      - name: Upload MCP Registry publish report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: publish-report-${{ github.event.repository.name }}-mcp-registry
          path: out/publish-report-mcp-registry.json
          if-no-files-found: ignore

  package-extension:
    if: ${{ github.repository == '__TARGET_REPOSITORY__' }}
    outputs:
      package_name: ${{ steps.meta.outputs.name }}
      package_version: ${{ steps.meta.outputs.version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Resolve publish ref
        id: ref
        env:
          INPUT_REF: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          ref="${INPUT_REF:-${GITHUB_SHA}}"
          if [[ ! "${ref}" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "INVALID_PUBLISH_REF" >&2
            echo "Publish ref must resolve to a 40-character commit SHA." >&2
            exit 1
          fi
          echo "value=${ref}" >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ steps.ref.outputs.value }}
          fetch-depth: 0
          persist-credentials: false
      - name: Verify publish ref is on release channel
        env:
          PUBLISH_REF: ${{ steps.ref.outputs.value }}
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin main
          if ! git merge-base --is-ancestor "${PUBLISH_REF}" origin/main; then
            echo "PUBLISH_REF_NOT_ON_RELEASE_CHANNEL" >&2
            echo "Ref must be reachable from origin/main." >&2
            exit 1
          fi
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ""
      - name: Install dependencies
        run: |
          set -euo pipefail
          cd "${VSCODE_DIRECTORY}"
          corepack enable
          corepack install
          corepack pnpm install --frozen-lockfile
      - name: Build extension
        run: |
          set -euo pipefail
          cd "${VSCODE_DIRECTORY}"
          corepack pnpm run --if-present build
      - name: Validate extension manifest
        id: meta
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require("fs");
          const dir = process.env.VSCODE_DIRECTORY;
          const p = JSON.parse(fs.readFileSync(`${dir}/package.json`, "utf8"));
          for (const key of ["publisher", "name", "version"]) {
            if (!p[key]) throw new Error(`EXTENSION_MANIFEST_INVALID ${key}`);
          }
          if (!p.engines?.vscode) throw new Error("EXTENSION_MANIFEST_INVALID engines.vscode");
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `name=${p.name}\nversion=${p.version}\n`);
          NODE
      - name: Package VSIX
        run: |
          set -euo pipefail
          cd "${VSCODE_DIRECTORY}"
          mkdir -p out
          package_name="${{ steps.meta.outputs.name }}"
          package_version="${{ steps.meta.outputs.version }}"
          npx --yes "@vscode/vsce@${VSCE_VERSION}" package --no-dependencies --out "out/${package_name}-${package_version}.vsix"
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: vscode-extension-package
          path: __VSCODE_DIRECTORY__/out/*.vsix
          if-no-files-found: error

  vscode-marketplace:
    if: ${{ github.repository == '__TARGET_REPOSITORY__' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: package-extension
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ""
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: vscode-extension-package
          path: out
      - name: Publish VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          VS_MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}
        run: |
          set -euo pipefail
          package_name="${{ needs.package-extension.outputs.package_name }}"
          package_version="${{ needs.package-extension.outputs.package_version }}"
          write_report() {
            local state="$1"
            local result="$2"
            local blocker="$3"
            REPORT_CHANNEL="vscode_marketplace" \
            REPORT_STATE="${state}" \
            REPORT_RESULT="${result}" \
            REPORT_BLOCKER="${blocker}" \
            REPORT_PACKAGE="${package_name}" \
            REPORT_VERSION="${package_version}" \
            REPORT_PATH="out/publish-report-vscode-marketplace.json" \
            node <<'NODE'
          const fs = require("fs");
          const report = {
            channel: process.env.REPORT_CHANNEL,
            state: process.env.REPORT_STATE,
            result: process.env.REPORT_RESULT,
            blocker: process.env.REPORT_BLOCKER,
            package: process.env.REPORT_PACKAGE,
            version: process.env.REPORT_VERSION,
            run_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            evidence: [],
          };
          fs.writeFileSync(process.env.REPORT_PATH, `${JSON.stringify(report, null, 2)}\n`);
          NODE
          }
          token="${VSCE_PAT:-${VS_MARKETPLACE_TOKEN:-}}"
          if [[ -z "${token}" ]]; then echo "MARKETPLACE_SECRET_MISSING"; write_report "failed" "external_blocker" "MARKETPLACE_SECRET_MISSING"; exit 1; fi
          vsix="$(find out -maxdepth 1 -type f -name '*.vsix' -print -quit)"
          if [[ -z "${vsix}" ]]; then echo "EXTENSION_PACKAGE_MISSING"; write_report "failed" "workflow_failure" "EXTENSION_PACKAGE_MISSING"; exit 1; fi
          set +e
          output="$(npx --yes "@vscode/vsce@${VSCE_VERSION}" publish --packagePath "${vsix}" --pat "${token}" 2>&1)"
          status="$?"
          set -e
          printf '%s\n' "${output}"
          if [[ "${status}" -eq 0 ]]; then write_report "published" "fresh_publish_success" ""; exit 0; fi
          if printf '%s\n' "${output}" | grep -Eiq 'already.*published|version.*already|already exists'; then
            echo "MARKETPLACE_VERSION_ALREADY_PUBLISHED"
            write_report "already_published" "idempotent_noop" ""
            exit 0
          fi
          write_report "failed" "workflow_failure" "MARKETPLACE_PUBLISH_FAILED"
          exit "${status}"
      - name: Upload VS Code Marketplace publish report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: publish-report-${{ github.event.repository.name }}-vscode-marketplace
          path: out/publish-report-vscode-marketplace.json
          if-no-files-found: ignore

  open-vsx:
    if: ${{ github.repository == '__TARGET_REPOSITORY__' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: package-extension
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ""
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: vscode-extension-package
          path: out
      - name: Publish Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: |
          set -euo pipefail
          package_name="${{ needs.package-extension.outputs.package_name }}"
          package_version="${{ needs.package-extension.outputs.package_version }}"
          write_report() {
            local state="$1"
            local result="$2"
            local blocker="$3"
            REPORT_CHANNEL="open_vsx" \
            REPORT_STATE="${state}" \
            REPORT_RESULT="${result}" \
            REPORT_BLOCKER="${blocker}" \
            REPORT_PACKAGE="${package_name}" \
            REPORT_VERSION="${package_version}" \
            REPORT_PATH="out/publish-report-open-vsx.json" \
            node <<'NODE'
          const fs = require("fs");
          const report = {
            channel: process.env.REPORT_CHANNEL,
            state: process.env.REPORT_STATE,
            result: process.env.REPORT_RESULT,
            blocker: process.env.REPORT_BLOCKER,
            package: process.env.REPORT_PACKAGE,
            version: process.env.REPORT_VERSION,
            run_url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            evidence: [],
          };
          fs.writeFileSync(process.env.REPORT_PATH, `${JSON.stringify(report, null, 2)}\n`);
          NODE
          }
          token="${OVSX_PAT:-${OPEN_VSX_TOKEN:-}}"
          if [[ -z "${token}" ]]; then echo "OPEN_VSX_SECRET_MISSING"; write_report "failed" "external_blocker" "OPEN_VSX_SECRET_MISSING"; exit 1; fi
          vsix="$(find out -maxdepth 1 -type f -name '*.vsix' -print -quit)"
          if [[ -z "${vsix}" ]]; then echo "EXTENSION_PACKAGE_MISSING"; write_report "failed" "workflow_failure" "EXTENSION_PACKAGE_MISSING"; exit 1; fi
          set +e
          output="$(npx --yes "ovsx@${OVSX_VERSION}" publish "${vsix}" --pat "${token}" 2>&1)"
          status="$?"
          set -e
          printf '%s\n' "${output}"
          if [[ "${status}" -eq 0 ]]; then write_report "published" "fresh_publish_success" ""; exit 0; fi
          if printf '%s\n' "${output}" | grep -Eiq 'already.*published|version.*already|already exists'; then
            echo "OPEN_VSX_VERSION_ALREADY_PUBLISHED"
            write_report "already_published" "idempotent_noop" ""
            exit 0
          fi
          write_report "failed" "workflow_failure" "OPEN_VSX_PUBLISH_FAILED"
          exit "${status}"
      - name: Upload Open VSX publish report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: publish-report-${{ github.event.repository.name }}-open-vsx
          path: out/publish-report-open-vsx.json
          if-no-files-found: ignore
